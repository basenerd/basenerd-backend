{% extends "base.html" %}
{% block content %}

<style>
  .tp-header{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  .tp-date-form{ display:flex; gap:10px; align-items:center; }
  .tp-loading{ text-align:center; padding:60px 20px; opacity:0.5; }
  .tp-empty{ text-align:center; padding:40px 20px; opacity:0.5; }

  /* Controls row */
  .tp-controls{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    margin-top:16px; margin-bottom:14px;
    padding:12px 16px;
    background:rgba(0,0,0,0.015);
    border:1px solid var(--border, rgba(0,0,0,0.08));
    border-radius:10px;
  }
  .tp-controls-label{
    font-size:0.72rem; font-weight:700; color:#555; text-transform:uppercase;
    letter-spacing:0.5px; margin-right:4px;
  }
  .tp-controls-row{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  }

  /* View toggle */
  .tp-view-tabs{
    display:flex; gap:0; border-radius:8px; overflow:hidden;
    border:1px solid var(--border, rgba(0,0,0,0.1));
  }
  .tp-view-btn{
    padding:7px 18px; font-size:0.8rem; font-weight:700; cursor:pointer;
    background:transparent; color:#111; border:none;
    transition: all 0.15s;
  }
  .tp-view-btn.active{ background:rgba(240,192,64,0.25); color:#b8860b; }
  .tp-view-btn:hover:not(.active){ background:rgba(0,0,0,0.04); }

  /* Stat toggle */
  .tp-stat-toggle{
    display:flex; gap:0; border-radius:6px; overflow:hidden;
    border:1px solid var(--border, rgba(0,0,0,0.1));
  }
  .tp-stat-btn{
    padding:6px 14px; font-size:0.75rem; font-weight:700; cursor:pointer;
    background:rgba(0,0,0,0.02); color:#111; border:none;
    border-right:1px solid var(--border, rgba(0,0,0,0.06));
    transition: all 0.15s; white-space:nowrap;
  }
  .tp-stat-btn:last-child{ border-right:none; }
  .tp-stat-btn.active{ background:rgba(240,192,64,0.25); color:#b8860b; }
  .tp-stat-btn:hover:not(.active){ background:rgba(0,0,0,0.05); }

  /* Table */
  .tp-tbl-wrap{
    overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:4px;
  }
  .tp-tbl{
    width:100%; border-collapse:collapse; font-size:0.8rem;
  }
  .tp-tbl th{
    text-align:center; padding:8px 5px; font-size:0.7rem; font-weight:700;
    text-transform:uppercase; letter-spacing:0.3px; opacity:0.5;
    border-bottom:2px solid var(--border, rgba(0,0,0,0.08));
    white-space:nowrap; cursor:pointer; user-select:none;
    position:relative;
  }
  .tp-tbl th:hover{ opacity:0.8; }
  .tp-tbl th.player-col{
    text-align:left; min-width:190px; cursor:pointer;
  }
  .tp-tbl th.opp-col{
    text-align:left; min-width:100px;
  }
  .tp-tbl th.num-col{
    min-width:50px; width:50px;
  }
  .tp-tbl th.exp-col{
    min-width:54px; border-left:2px solid rgba(0,0,0,0.06);
  }
  .tp-tbl th .sort-arrow{
    font-size:0.6rem; margin-left:2px; opacity:0.4;
  }
  .tp-tbl th.sorted .sort-arrow{ opacity:1; color:#f0c040; }

  .tp-tbl td{
    padding:8px 5px; border-bottom:1px solid rgba(0,0,0,0.04);
    text-align:center; font-variant-numeric:tabular-nums;
  }
  .tp-tbl td.player-td{
    text-align:left;
  }
  .tp-tbl td.opp-td{
    text-align:left;
  }
  .tp-tbl td.exp-td{
    border-left:2px solid rgba(0,0,0,0.06);
    font-weight:800; color:#f0c040;
  }
  .tp-tbl tbody tr:hover{
    background:rgba(0,0,0,0.02);
  }

  /* Player cell */
  .tp-player-cell{
    display:flex; align-items:center; gap:8px;
  }
  .tp-team-logo-wrap{
    position:relative; flex-shrink:0; width:22px; height:22px;
  }
  .tp-team-logo{
    width:22px; height:22px; flex-shrink:0;
  }
  .tp-matchup-star{
    position:absolute; top:-5px; right:-7px;
    font-size:11px; line-height:1;
    filter: drop-shadow(0 0 2px rgba(240,192,64,0.6));
    pointer-events:none;
  }
  .tp-player-img{
    width:32px; height:32px; border-radius:50%; object-fit:cover;
    border:1.5px solid rgba(0,0,0,0.08); flex-shrink:0;
  }
  .tp-player-info{ min-width:0; }
  .tp-player-name{
    font-weight:700; font-size:0.8rem; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
  }
  .tp-player-meta{
    font-size:0.65rem; opacity:0.45;
  }

  /* Opponent cell */
  .tp-opp-cell{
    display:flex; align-items:center; gap:6px;
  }
  .tp-opp-logo{
    width:18px; height:18px; flex-shrink:0;
  }
  .tp-opp-name{
    font-size:0.78rem; font-weight:600;
  }

  /* Pct cell coloring — background tint for magnitude, text always visible */
  .tp-pct{
    font-size:0.78rem; font-weight:700; color:#111;
    display:inline-block; padding:2px 4px; border-radius:4px;
    min-width:36px; text-align:center;
  }

  @media(max-width:640px){
    /* Controls: stack vertically */
    .tp-controls{
      flex-direction:column; align-items:stretch; gap:10px;
      padding:10px 12px;
    }
    .tp-controls-label{ margin-bottom:2px; }
    .tp-controls-row{
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    }

    /* Stat toggle: allow wrapping */
    .tp-stat-toggle{ flex-wrap:wrap; gap:4px; }
    .tp-stat-btn{
      padding:8px 12px; font-size:0.72rem;
      min-height:38px;
    }
    .tp-view-btn{
      padding:8px 14px; font-size:0.75rem;
      min-height:38px;
    }

    /* Header: stack title and date form */
    .tp-header{ flex-direction:column; align-items:stretch; }
    .tp-date-form{ width:100%; justify-content:center; }

    /* Table */
    .tp-tbl{ font-size:0.72rem; }
    .tp-tbl th{ padding:6px 4px; font-size:0.62rem; }
    .tp-tbl td{ padding:6px 4px; }
    .tp-tbl th.num-col{ min-width:42px; width:42px; }
    .tp-tbl th.player-col{ min-width:140px; }
    .tp-tbl th.opp-col{ min-width:70px; }

    /* Sticky player column */
    .tp-tbl th.player-col,
    .tp-tbl td.player-td{
      position:sticky; left:0; z-index:2;
      background:var(--card, #fff);
      box-shadow:2px 0 4px rgba(0,0,0,0.06);
    }

    .tp-player-img{ width:24px; height:24px; }
    .tp-team-logo-wrap{ width:16px; height:16px; }
    .tp-team-logo{ width:16px; height:16px; }
    .tp-matchup-star{ font-size:9px; top:-4px; right:-6px; }
    .tp-player-name{ font-size:0.7rem; max-width:90px; }
    .tp-player-meta{ font-size:0.6rem; }
    .tp-pct{ font-size:0.68rem; min-width:32px; padding:2px 3px; }
    .tp-opp-name{ font-size:0.7rem; }
    .tp-opp-logo{ width:16px; height:16px; }
  }

  @media(max-width:400px){
    .tp-stat-btn{ padding:6px 8px; font-size:0.65rem; }
    .tp-view-btn{ padding:6px 10px; font-size:0.68rem; }
    .tp-tbl th.player-col{ min-width:120px; }
    .tp-player-name{ max-width:70px; }
    .tp-player-img{ display:none; }
  }

  /* ---- Stadium Conditions ---- */
  .sc-grid{
    display:grid; gap:14px;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    margin-top:4px;
  }
  .sc-card{
    border:1px solid var(--border, rgba(0,0,0,0.10));
    border-radius:14px;
    overflow:hidden;
    background:var(--card, #fff);
    display:flex; flex-direction:column;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  /* Header */
  .sc-card-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px 9px;
    border-bottom:1px solid rgba(0,0,0,0.06);
    gap:8px; background:var(--card,#fff);
  }
  .sc-matchup{
    display:flex; align-items:center; gap:6px; flex:1; min-width:0;
  }
  .sc-team-logo{ width:26px; height:26px; flex-shrink:0; }
  .sc-at{ font-size:0.68rem; opacity:0.35; font-weight:700; }
  .sc-abbrev{ font-size:0.88rem; font-weight:800; letter-spacing:0.3px; }
  .sc-time{ font-size:0.7rem; opacity:0.42; white-space:nowrap; }

  /* Stadium visual area */
  .sc-stadium-wrap{
    position:relative;
    background: linear-gradient(160deg, #111827 0%, #0d1117 60%, #090d13 100%);
    overflow:hidden;
  }
  .sc-stadium-wrap::after{
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 95%, rgba(30,50,90,0.35) 0%, transparent 70%);
    pointer-events:none;
  }
  .sc-stadium-svg-img{
    display:block; width:100%;
    /* scaleY(-1) flips SVG so outfield (y≈550) is at top, home plate (y≈93) at bottom */
    /* object-fit:contain shows full field without cropping */
    object-fit:contain; object-position:center;
    height:220px;
    opacity:0.45;
    filter: invert(1) brightness(1.4) saturate(0.2);
    transform: scaleY(-1);
  }

  /* HR zone chips overlaid on the SVG */
  .sc-zone-overlay{
    position:absolute; top:0; left:0; right:0; bottom:0;
    pointer-events:none;
  }
  .sc-zone-chip{
    position:absolute;
    display:flex; flex-direction:column; align-items:center; gap:1px;
    padding:4px 6px; border-radius:8px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.52);
    backdrop-filter:blur(6px);
    transform:translate(-50%,-50%);
    min-width:42px;
  }
  .sc-zone-chip.pos-strong{
    background:rgba(14,100,42,0.82); border-color:rgba(81,207,102,0.45);
    box-shadow:0 0 10px rgba(81,207,102,0.25);
  }
  .sc-zone-chip.pos{
    background:rgba(14,85,36,0.70); border-color:rgba(81,207,102,0.28);
  }
  .sc-zone-chip.neg{
    background:rgba(110,22,22,0.70); border-color:rgba(192,57,43,0.32);
  }
  .sc-zone-chip.neg-strong{
    background:rgba(130,18,18,0.82); border-color:rgba(192,57,43,0.48);
    box-shadow:0 0 10px rgba(192,57,43,0.22);
  }
  .sc-zone-chip.neu{
    background:rgba(30,30,30,0.62); border-color:rgba(255,255,255,0.10);
  }
  .sc-zone-chip-label{
    font-size:0.48rem; font-weight:700; text-transform:uppercase;
    letter-spacing:0.4px; color:rgba(255,255,255,0.55); white-space:nowrap;
  }
  .sc-zone-chip-val{
    font-size:0.78rem; font-weight:900; color:#fff;
    font-variant-numeric:tabular-nums; line-height:1;
  }
  /* Chip positions (% of container) */
  .sc-zone-lf { left:10%; top:52%; }
  .sc-zone-lcf{ left:30%; top:25%; }
  .sc-zone-cf { left:50%; top:11%; }
  .sc-zone-rcf{ left:70%; top:25%; }
  .sc-zone-rf { left:90%; top:52%; }

  /* Small note at bottom of SVG area for dome games */
  .sc-dome-label{
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    font-size:0.6rem; font-weight:600; color:rgba(255,255,255,0.38);
    letter-spacing:0.5px; white-space:nowrap;
  }

  /* Env badge centred at the bottom of the image area */
  .sc-env-badge-row{
    position:absolute; bottom:10px; left:0; right:0;
    display:flex; justify-content:center; pointer-events:none;
  }
  .sc-env-badge{
    display:inline-block; padding:4px 12px; border-radius:20px;
    font-size:0.7rem; font-weight:800; letter-spacing:0.2px;
    backdrop-filter:blur(6px);
  }
  .sc-env-hitter-very{
    background:rgba(22,130,54,0.80); color:#d4fde4;
    border:1px solid rgba(81,207,102,0.4);
  }
  .sc-env-hitter{
    background:rgba(22,110,46,0.70); color:#c0f5d2;
    border:1px solid rgba(81,207,102,0.25);
  }
  .sc-env-neutral{
    background:rgba(30,30,30,0.65); color:rgba(255,255,255,0.75);
    border:1px solid rgba(255,255,255,0.10);
  }
  .sc-env-pitcher{
    background:rgba(30,60,160,0.70); color:#c8d8ff;
    border:1px solid rgba(99,149,255,0.3);
  }
  .sc-env-pitcher-very{
    background:rgba(20,45,140,0.82); color:#b8ccff;
    border:1px solid rgba(99,149,255,0.45);
  }
  .sc-env-dome{
    background:rgba(50,50,50,0.72); color:rgba(255,255,255,0.65);
    border:1px solid rgba(255,255,255,0.10);
  }

  /* Footer */
  .sc-card-footer{
    padding:10px 14px 12px;
    display:flex; flex-direction:column; gap:7px;
    border-top:1px solid rgba(0,0,0,0.05);
  }
  .sc-venue-row{
    display:flex; align-items:baseline; gap:6px; flex-wrap:wrap;
  }
  .sc-venue-name{ font-size:0.8rem; font-weight:700; }
  .sc-venue-loc{ font-size:0.68rem; opacity:0.42; }

  .sc-weather-row{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .sc-weather-item{
    display:flex; align-items:center; gap:4px;
    font-size:0.73rem; font-weight:600;
  }
  .sc-weather-label{
    font-size:0.62rem; opacity:0.42; text-transform:uppercase; letter-spacing:0.3px;
  }

  .sc-xbh-row{
    display:flex; align-items:center; gap:8px; font-size:0.72rem; opacity:0.65;
  }
  .sc-xbh-val{ font-weight:800; opacity:1; }

  .sc-loading{ text-align:center; padding:40px 20px; opacity:0.5; }

  @media(max-width:640px){
    .sc-grid{ grid-template-columns:1fr; }
    .sc-abbrev{ font-size:0.82rem; }
    .sc-stadium-svg-img{ height:180px; }
  }

  /* ---- Games view ---- */
  .gm-tbl-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:4px; }
  .gm-tbl{ width:100%; border-collapse:collapse; font-size:0.8rem; }
  .gm-tbl th{
    text-align:center; padding:8px 5px; font-size:0.7rem; font-weight:700;
    text-transform:uppercase; letter-spacing:0.3px; opacity:0.5;
    border-bottom:2px solid var(--border, rgba(0,0,0,0.08));
    white-space:nowrap; cursor:pointer; user-select:none;
  }
  .gm-tbl th:hover{ opacity:0.8; }
  .gm-tbl th.gm-team-col{ text-align:left; min-width:170px; }
  .gm-tbl th.gm-num-col{ min-width:46px; width:46px; }
  .gm-tbl th.gm-exp-col{
    min-width:54px; border-left:2px solid rgba(0,0,0,0.06);
  }
  .gm-tbl th.gm-win-col{ min-width:54px; }
  .gm-tbl th .sort-arrow{ font-size:0.6rem; margin-left:2px; opacity:0.4; }
  .gm-tbl th.sorted .sort-arrow{ opacity:1; color:#f0c040; }
  .gm-tbl td{
    padding:8px 5px; border-bottom:1px solid rgba(0,0,0,0.04);
    text-align:center; font-variant-numeric:tabular-nums;
  }
  .gm-tbl td.gm-team-td{ text-align:left; }
  .gm-tbl td.gm-exp-td{
    border-left:2px solid rgba(0,0,0,0.06);
    font-weight:800; color:#f0c040;
  }
  .gm-tbl td.gm-win-td{ font-weight:700; }
  .gm-tbl tbody tr:hover{ background:rgba(0,0,0,0.02); }
  .gm-tbl tbody tr.gm-separator td{
    border-bottom:2px solid rgba(0,0,0,0.10); padding:0; height:0;
  }
  .gm-team-cell{ display:flex; align-items:center; gap:8px; }
  .gm-team-logo{ width:22px; height:22px; flex-shrink:0; }
  .gm-team-name{ font-weight:700; font-size:0.82rem; }
  .gm-team-meta{ font-size:0.65rem; opacity:0.45; margin-left:4px; }
  .gm-pitcher-name{ font-size:0.7rem; opacity:0.55; }

  @media(max-width:640px){
    .gm-tbl{ font-size:0.72rem; }
    .gm-tbl th{ padding:6px 4px; font-size:0.62rem; }
    .gm-tbl td{ padding:6px 4px; }
    .gm-tbl th.gm-team-col{ min-width:130px; }
    .gm-tbl th.gm-num-col{ min-width:38px; width:38px; }
    .gm-tbl th.gm-team-col,
    .gm-tbl td.gm-team-td{
      position:sticky; left:0; z-index:2;
      background:var(--card, #fff);
      box-shadow:2px 0 4px rgba(0,0,0,0.06);
    }
    .gm-team-logo{ width:16px; height:16px; }
    .gm-team-name{ font-size:0.72rem; }
  }

  /* ---- NRFI view ---- */
  .nf-grid{
    display:grid; gap:14px;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    margin-top:4px;
  }
  .nf-card{
    border:1px solid var(--border, rgba(0,0,0,0.10));
    border-radius:14px; overflow:hidden;
    background:var(--card, #fff);
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .nf-card-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px 9px;
    border-bottom:1px solid rgba(0,0,0,0.06);
    gap:8px;
  }
  .nf-matchup{
    display:flex; align-items:center; gap:6px; flex:1; min-width:0;
  }
  .nf-team-logo{ width:24px; height:24px; flex-shrink:0; }
  .nf-at{ font-size:0.68rem; opacity:0.35; font-weight:700; }
  .nf-abbrev{ font-size:0.88rem; font-weight:800; letter-spacing:0.3px; }
  .nf-time{ font-size:0.7rem; opacity:0.42; white-space:nowrap; }

  .nf-body{ padding:14px; }

  /* Gauge */
  .nf-gauge{ height:28px; border-radius:6px; overflow:hidden;
    display:flex; margin-bottom:12px; }
  .nf-gauge-nrfi{
    background: linear-gradient(90deg, #2d6a2d, #51cf66);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:0.78rem; color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,0.4); min-width:40px;
    transition: width 0.5s ease;
  }
  .nf-gauge-yrfi{
    background: linear-gradient(90deg, #ff6b6b, #c92a2a);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:0.78rem; color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,0.4); min-width:40px;
    transition: width 0.5s ease;
  }

  /* Badge */
  .nf-badge{
    display:inline-block; font-size:0.7rem; padding:2px 10px; border-radius:4px;
    font-weight:700; text-transform:uppercase; letter-spacing:0.4px;
    margin-bottom:10px;
  }
  .nf-badge.lean-nrfi{ background:rgba(81,207,102,0.15); color:#2d8a4e; border:1px solid rgba(81,207,102,0.3); }
  .nf-badge.lean-yrfi{ background:rgba(255,107,107,0.15); color:#c0392b; border:1px solid rgba(255,107,107,0.3); }
  .nf-badge.tossup{ background:rgba(255,212,59,0.15); color:#b8860b; border:1px solid rgba(255,212,59,0.3); }

  /* Half-inning rows */
  .nf-halves{ display:flex; flex-direction:column; gap:8px; }
  .nf-half{
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(0,0,0,0.025); border-radius:8px; padding:8px 12px; gap:10px;
  }
  .nf-half-label{ font-size:0.68rem; font-weight:700; opacity:0.45;
    text-transform:uppercase; width:44px; flex-shrink:0; }
  .nf-half-pitcher{ font-size:0.78rem; font-weight:600; flex:1; min-width:0;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nf-half-stats{ display:flex; gap:12px; flex-shrink:0; }
  .nf-half-stat{ text-align:center; }
  .nf-half-stat-label{ font-size:0.58rem; opacity:0.4; text-transform:uppercase; }
  .nf-half-stat-val{ font-size:0.88rem; font-weight:800; }
  .nf-half-stat-val.clean{ color:#2d8a4e; }
  .nf-half-stat-val.danger{ color:#c0392b; }
  .nf-half-stat-val.neutral{ color:#b8860b; }

  .nf-odds-row{
    margin-top:10px; padding:8px 12px; border-radius:8px;
    font-size:0.78rem; font-weight:700;
    display:flex; align-items:center; gap:8px;
  }
  .nf-odds-row.bet-nrfi{
    background:rgba(81,207,102,0.10); color:#2d8a4e;
    border:1px solid rgba(81,207,102,0.25);
  }
  .nf-odds-row.bet-yrfi{
    background:rgba(255,107,107,0.10); color:#c0392b;
    border:1px solid rgba(255,107,107,0.25);
  }
  .nf-odds-row.bet-skip{
    background:rgba(0,0,0,0.03); color:#888;
    border:1px solid rgba(0,0,0,0.08);
  }
  .nf-odds-val{
    font-size:0.95rem; font-weight:900; letter-spacing:0.3px;
  }

  @media(max-width:640px){
    .nf-grid{ grid-template-columns:1fr; }
    .nf-abbrev{ font-size:0.82rem; }
  }
</style>

<div class="card">
  <div class="card-header tp-header">
    <div>
      <div class="card-title">Today's Projections</div>
      <div class="card-subtitle">Stat probability distributions for every pitcher and hitter</div>
    </div>
    <form method="get" action="/todays-projections" class="tp-date-form">
      <button type="button" class="date-arrow" id="tp-prev">&lsaquo;</button>
      <input class="input" type="date" name="date" value="{{ date }}" aria-label="Pick date" />
      <button type="button" class="date-arrow" id="tp-next">&rsaquo;</button>

    <span class="tp-controls-label">View:</span>
    <div class="tp-view-tabs">
      <button class="tp-view-btn active" data-view="pitchers">Pitchers</button>
      <button class="tp-view-btn" data-view="batters">Batters</button>
      <button class="tp-view-btn" data-view="games">Games</button>

    </div>
  </div>
  <div class="tp-controls-row" id="tp-stat-row">

<div id="tp-table-area"></div>
<div id="tp-games-area" style="display:none"></div>
<div id="tp-nrfi-area" style="display:none"></div>
<div id="tp-stadium-area" style="display:none"></div>

<script>
(function(){
  const GAMES = {{ games | tojson }};

  // ---- Poisson math ----
  function poissonPMF(lam, k){
    if(lam <= 0) return k === 0 ? 1 : 0;
    let logP = -lam + k * Math.log(lam);
    for(let i = 2; i <= k; i++) logP -= Math.log(i);
    return Math.exp(logP);
  }

  function computeDist(lam, maxK){
    const dist = [];
    for(let k = 0; k <= maxK; k++){
      dist.push(poissonPMF(lam, k) * 100);
    }
    return dist;
  }

  // ---- Stat definitions ----
  const P_STATS = [
    {key:'k',  label:'Strikeouts',     maxK:10},
    {key:'ip', label:'Innings Pitched', maxK:8},
    {key:'h',  label:'Hits Allowed',    maxK:9},
    {key:'bb', label:'Walks',           maxK:5},
    {key:'hr', label:'Homers Allowed',  maxK:3},
  ];
  const B_STATS = [
    {key:'h',   label:'Hits',      maxK:4},
    {key:'hr',  label:'Home Runs', maxK:3},
    {key:'rbi', label:'RBIs',      maxK:5},
    {key:'tb',  label:'Tot Bases', maxK:6},
    {key:'rhr', label:'R+H+RBI',   maxK:8},
  ];

  // ---- Lambda computations ----
  function pitcherLambdas(side, isSpring){
    const batters = (side.batters||[]).filter(b => b.probs && Object.keys(b.probs).length);
    if(!batters.length) return null;
    const n = batters.length;
    const estBF = isSpring ? 12 : 24;
    const avgK   = batters.reduce((s,b)=>s+(b.probs.K||0),0)/n;
    const avgBB  = batters.reduce((s,b)=>s+(b.probs.BB||0)+(b.probs.IBB||0)+(b.probs.HBP||0),0)/n;
    const avgHit = batters.reduce((s,b)=>s+(b.summary?.hit_pct||0),0)/n;
    const avgHR  = batters.reduce((s,b)=>s+(b.probs.HR||0),0)/n;
    const avgOut = batters.reduce((s,b)=>s+(b.probs.OUT||0)+(b.probs.K||0),0)/n;
    return { k: estBF*avgK, ip: estBF*avgOut/3, h: estBF*avgHit, bb: estBF*avgBB, hr: estBF*avgHR };
  }

  function batterLambdas(b){
    const probs = b.probs||{};
    const summary = b.summary||{};
    const sl = b.statline||{};
    if(!sl.pa) return null;
    const h   = sl.pa * (summary.hit_pct||0);
    const rbi = sl.rbi || sl.pa * ((probs.HR||0)*1.5 + (probs['2B']||0)*0.5 + (probs['3B']||0)*0.8 + (probs['1B']||0)*0.15);
    // Runs estimated via run-expectancy weights per event
    const r   = sl.pa * ((probs['1B']||0)*0.50 + (probs['2B']||0)*0.60 + (probs['3B']||0)*0.80 +
                          (probs.HR||0)*1.40 + ((probs.BB||0)+(probs.IBB||0)+(probs.HBP||0))*0.35);
    // Total bases: 1B×1 + 2B×2 + 3B×3 + HR×4
    const tb  = sl.pa * ((probs['1B']||0)*1 + (probs['2B']||0)*2 + (probs['3B']||0)*3 + (probs.HR||0)*4);
    return { h, hr: sl.pa * (probs.HR||0), rbi, tb, rhr: r + h + rbi };
  }

  // ---- Formatting ----
  function fmtPct(pct){
    if(pct >= 10) return pct.toFixed(0) + '%';
    if(pct >= 1)  return pct.toFixed(1) + '%';
    if(pct >= 0.1) return pct.toFixed(1) + '%';
    return '&lt;1%';
  }
  function pctBg(pct){
    // Green-tinted background that scales with probability
    // High values get more opaque background, low values are subtle
    const alpha = Math.min(0.35, pct / 80);
    return `background:rgba(81,207,102,${alpha.toFixed(3)})`;
  }
  function headshotUrl(pid){
    return `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_80,q_auto:best/v1/people/${pid}/headshot/67/current`;
  }
  function teamLogoUrl(tid){
    return tid ? `https://www.mlbstatic.com/team-logos/${tid}.svg` : '';
  }

  // ---- American odds conversion ----
  function probToAmerican(p){
    if(p <= 0 || p >= 1) return 0;
    let raw;
    if(p >= 0.5) raw = -(p / (1 - p)) * 100;
    else raw = ((1 - p) / p) * 100;
    return Math.round(raw / 5) * 5;
  }
  function fmtOdds(odds){
    return odds >= 0 ? `+${odds}` : `${odds}`;
  }

  // ---- Matchup grade helpers ----
  const GRADE_VAL = {'A+':13,'A':12,'A-':11,'B+':10,'B':9,'B-':8,'C+':7,'C':6,'C-':5,'D+':4,'D':3,'D-':2,'F':1};
  function gradeToNum(g){ return GRADE_VAL[g] || 0; }
  // Batters: star if grade >= A- (great matchup for hitter)
  function batterHasMatchupStar(grade){ return gradeToNum(grade) >= 11; }
  // Pitchers: star if avg opposing batter grade <= C (weak lineup = great matchup for pitcher)
  function pitcherHasMatchupStar(avgGrade){ return avgGrade > 0 && avgGrade <= 6; }

  // ---- Global data stores ----
  let allPitchers = [];
  let allBatters = [];
  let allGames = [];
  let currentView = 'pitchers';
  let stadiumData = null; // loaded lazily
  let currentPStat = 'k';
  let currentBStat = 'h';
  let currentMode = 'exact'; // 'exact' or 'cumul'
  let sortCol = 'exp';
  let sortDir = -1; // -1 = desc

  // ---- Filter games ----
  const previewGames = GAMES.filter(g=>{
    const ds = (g.detailedState||'').toLowerCase();
    return ds.includes('scheduled') || ds.includes('warmup') || ds.includes('pre-game')
      || ds.includes('preview') || ds.includes('in progress') || ds.includes('live');
  });

  if(!previewGames.length && !GAMES.length){
    document.getElementById('tp-loading').style.display = 'none';
    document.getElementById('tp-table-area').innerHTML = '<div class="tp-empty">No upcoming games for this date.</div>';
  } else if(!previewGames.length){
    // Games exist (completed/postponed) but none eligible for projections
    document.getElementById('tp-loading').style.display = 'none';
    document.getElementById('tp-controls').style.display = 'flex';
    document.getElementById('tp-table-area').innerHTML = '<div class="tp-empty">No upcoming games for this date.</div>';
    attachViewListeners();
  } else {
    let loaded = 0;
    const total = previewGames.length;

    previewGames.forEach((g, gi)=>{
      fetch(`/game/${g.gamePk}/pregame.json`)
        .then(r=>r.json())
        .then(d => collectGameData(d, g))
        .catch(()=>{})
        .finally(()=>{
          loaded++;
          if(loaded === total) finishLoading();
        });
    });
  }

  function collectGameData(d, gameMeta){
    if(!d.ok || !d.lineups_posted) return;

    const awayLogo = gameMeta.away?.logo || '';
    const homeLogo = gameMeta.home?.logo || '';
    const awayAbbrev = d.away_abbrev || gameMeta.away?.abbrev || '';
    const homeAbbrev = d.home_abbrev || gameMeta.home?.abbrev || '';

    // Game-level data for Games and NRFI tabs
    // Note: d.away has the home pitcher (facing away batters), d.home has the away pitcher
    allGames.push({
      gamePk: gameMeta.gamePk,
      awayAbbrev, homeAbbrev, awayLogo, homeLogo,
      awayName: d.away_name || '', homeName: d.home_name || '',
      gameTime: d.game_time || gameMeta.timeLocal || '',
      homePitcher: d.away?.pitcher || null,
      awayPitcher: d.home?.pitcher || null,
      simulation: d.simulation || null,
      nrfi: d.nrfi || null,
    });

    // Pitchers
    // d.home = away pitcher facing home lineup; d.away = home pitcher facing away lineup
    [
      {side: d.home, pitcher: d.home?.pitcher, teamAbbrev: awayAbbrev, teamLogo: awayLogo, oppAbbrev: homeAbbrev, oppLogo: homeLogo},
      {side: d.away, pitcher: d.away?.pitcher, teamAbbrev: homeAbbrev, teamLogo: homeLogo, oppAbbrev: awayAbbrev, oppLogo: awayLogo},
    ].forEach(cfg => {
      if(!cfg.pitcher) return;
      const lam = pitcherLambdas(cfg.side, d.is_spring);
      if(!lam) return;
      const hand = cfg.pitcher.throws === 'L' ? 'LHP' : 'RHP';
      // Avg matchup grade of opposing batters (low = weak lineup = good for pitcher)
      const grades = (cfg.side.batters||[]).map(b => gradeToNum(b.grade)).filter(v => v > 0);
      const avgGrade = grades.length ? grades.reduce((a,b)=>a+b,0)/grades.length : 0;
      allPitchers.push({
        id: cfg.pitcher.id,
        name: cfg.pitcher.name,
        hand,
        teamAbbrev: cfg.teamAbbrev,
        teamLogo: cfg.teamLogo,
        oppAbbrev: cfg.oppAbbrev,
        oppLogo: cfg.oppLogo,
        lambdas: lam,
        matchupStar: pitcherHasMatchupStar(avgGrade),
      });
    });

    // Batters
    [
      {batters: d.away?.batters||[], teamAbbrev: awayAbbrev, teamLogo: awayLogo, oppName: d.away?.pitcher?.name || '', oppAbbrev: homeAbbrev, oppLogo: homeLogo},
      {batters: d.home?.batters||[], teamAbbrev: homeAbbrev, teamLogo: homeLogo, oppName: d.home?.pitcher?.name || '', oppAbbrev: awayAbbrev, oppLogo: awayLogo},
    ].forEach(cfg => {
      cfg.batters.forEach(b => {
        const lam = batterLambdas(b);
        if(!lam) return;
        allBatters.push({
          id: b.id,
          name: b.name,
          stand: b.stand,
          pos: b.pos,
          teamAbbrev: cfg.teamAbbrev,
          teamLogo: cfg.teamLogo,
          oppAbbrev: cfg.oppAbbrev,
          oppLogo: cfg.oppLogo,
          oppName: cfg.oppName,
          lambdas: lam,
          matchupStar: batterHasMatchupStar(b.grade),
        });
      });
    });
  }

  function finishLoading(){
    document.getElementById('tp-loading').style.display = 'none';
    document.getElementById('tp-controls').style.display = 'flex';

    if(!allPitchers.length && !allBatters.length){
      document.getElementById('tp-table-area').innerHTML = '<div class="tp-empty">No lineups posted yet. Check back closer to game time.</div>';
      // Still show controls so Stadium Conditions tab is accessible
      attachViewListeners();
      return;
    }

    buildStatToggle();
    renderTable();
    attachViewListeners();
  }

  function attachViewListeners(){
    // View toggle (Pitchers / Batters / Stadium Conditions)
    document.querySelectorAll('.tp-view-btn:not(.tp-mode-btn)').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        document.querySelectorAll('.tp-view-btn:not(.tp-mode-btn)').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;

        const isTable = currentView === 'pitchers' || currentView === 'batters';
        const isGames = currentView === 'games';
        const isNRFI = currentView === 'nrfi';
        const isStadium = currentView === 'stadium';

        // Show/hide mode and stat controls
        const showMode = isTable || isGames;
        document.getElementById('tp-mode-label').style.display = showMode ? '' : 'none';
        document.getElementById('tp-mode-group').style.display = showMode ? '' : 'none';
        document.getElementById('tp-stat-row').style.display = isTable ? '' : 'none';

        // Show/hide content areas
        document.getElementById('tp-table-area').style.display = isTable ? '' : 'none';
        document.getElementById('tp-games-area').style.display = isGames ? '' : 'none';
        document.getElementById('tp-nrfi-area').style.display = isNRFI ? '' : 'none';
        document.getElementById('tp-stadium-area').style.display = isStadium ? '' : 'none';

        if(isStadium){
          loadStadiumConditions();
        } else if(isGames){
          gmSortCol = 'exp'; gmSortDir = -1;
          renderGamesTable();
        } else if(isNRFI){
          renderNRFICards();
        } else {
          sortCol = 'exp'; sortDir = -1;
          buildStatToggle();
          renderTable();
        }
      });
    });

    // Mode toggle (Exact / Over)
    document.querySelectorAll('.tp-mode-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        document.querySelectorAll('.tp-mode-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        if(currentView === 'games'){
          gmSortCol = 'exp'; gmSortDir = -1;
          renderGamesTable();
        } else {
          sortCol = 'exp'; sortDir = -1;
          renderTable();
        }
      });
    });
  }

  function buildStatToggle(){
    const stats = currentView === 'pitchers' ? P_STATS : B_STATS;
    const current = currentView === 'pitchers' ? currentPStat : currentBStat;
    const el = document.getElementById('tp-stat-toggle');
    el.innerHTML = stats.map(s =>
      `<button class="tp-stat-btn ${s.key===current?'active':''}" data-stat="${s.key}">${s.label}</button>`
    ).join('');
    el.querySelectorAll('.tp-stat-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        el.querySelectorAll('.tp-stat-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        if(currentView === 'pitchers') currentPStat = btn.dataset.stat;
        else currentBStat = btn.dataset.stat;
        sortCol = 'exp'; sortDir = -1;
        renderTable();
      });
    });
  }

  function renderTable(){
    const isPitcher = currentView === 'pitchers';
    const stats = isPitcher ? P_STATS : B_STATS;
    const statKey = isPitcher ? currentPStat : currentBStat;
    const stat = stats.find(s=>s.key===statKey);
    const maxK = stat.maxK;
    const players = isPitcher ? allPitchers : allBatters;

    const isCumul = currentMode === 'cumul';

    // Compute distributions
    const rows = players.map(p => {
      const lam = p.lambdas[statKey] || 0;
      const exactDist = computeDist(lam, maxK);
      let dist;
      if(isCumul){
        // cumul[k] = P(X >= k) = 1 - sum(P(0)..P(k-1))
        dist = [];
        let cumSum = 0;
        for(let k = 0; k <= maxK; k++){
          dist.push((1 - cumSum) * 100);
          cumSum += exactDist[k] / 100;
        }
      } else {
        dist = exactDist;
      }
      return { ...p, dist, lam };
    });

    // Sort
    rows.sort((a,b)=>{
      let av, bv;
      if(sortCol === 'name'){ av = a.name.toLowerCase(); bv = b.name.toLowerCase(); return sortDir * av.localeCompare(bv); }
      if(sortCol === 'opp'){ av = a.oppAbbrev; bv = b.oppAbbrev; return sortDir * av.localeCompare(bv); }
      if(sortCol === 'exp'){ av = a.lam; bv = b.lam; }
      else { const k = parseInt(sortCol); av = a.dist[k]||0; bv = b.dist[k]||0; }
      return sortDir * (av - bv);
    });

    // Build table
    let html = '<div class="tp-tbl-wrap"><table class="tp-tbl"><thead><tr>';

    // Player column
    const sc = col => col===sortCol ? 'sorted' : '';
    const arrow = col => col===sortCol ? (sortDir>0?'&#9650;':'&#9660;') : '&#9650;';
    html += `<th class="player-col ${sc('name')}" data-sort="name">Player <span class="sort-arrow">${arrow('name')}</span></th>`;
    html += `<th class="opp-col ${sc('opp')}" data-sort="opp">${isPitcher ? 'Opponent' : 'vs Pitcher'} <span class="sort-arrow">${arrow('opp')}</span></th>`;

    for(let k = 0; k <= maxK; k++){
      const label = isCumul ? `${k}+` : (k === maxK ? `${k}+` : k);
      html += `<th class="num-col ${sc(String(k))}" data-sort="${k}">${label} <span class="sort-arrow">${arrow(String(k))}</span></th>`;
    }
    html += `<th class="exp-col ${sc('exp')}" data-sort="exp">Exp <span class="sort-arrow">${arrow('exp')}</span></th>`;
    html += '</tr></thead><tbody>';

    rows.forEach(r => {
      html += '<tr>';

      // Player cell
      html += `<td class="player-td"><div class="tp-player-cell">`;
      const starHtml = r.matchupStar ? '<span class="tp-matchup-star" title="Great matchup">&#11088;</span>' : '';
      if(r.teamLogo) html += `<div class="tp-team-logo-wrap"><img class="tp-team-logo" src="${r.teamLogo}" alt="" onerror="this.style.display='none'">${starHtml}</div>`;
      html += `<img class="tp-player-img" src="${headshotUrl(r.id)}" alt="" onerror="this.style.display='none'">`;
      html += `<div class="tp-player-info"><div class="tp-player-name">${r.name}</div>`;
      if(isPitcher){
        html += `<div class="tp-player-meta">${r.teamAbbrev} &middot; ${r.hand}</div>`;
      } else {
        html += `<div class="tp-player-meta">${r.teamAbbrev} &middot; ${r.stand} ${r.pos}</div>`;
      }
      html += '</div></div></td>';

      // Opponent cell
      html += `<td class="opp-td"><div class="tp-opp-cell">`;
      if(r.oppLogo) html += `<img class="tp-opp-logo" src="${r.oppLogo}" alt="" onerror="this.style.display='none'">`;
      if(isPitcher){
        html += `<span class="tp-opp-name">${r.oppAbbrev}</span>`;
      } else {
        html += `<span class="tp-opp-name">${r.oppName || r.oppAbbrev}</span>`;
      }
      html += '</div></td>';

      // Pct cells — always maxK+1 cells
      for(let k = 0; k <= maxK; k++){
        const pct = r.dist[k] || 0;
        html += `<td><span class="tp-pct" style="${pctBg(pct)}">${fmtPct(pct)}</span></td>`;
      }

      // Expected
      html += `<td class="exp-td">${r.lam.toFixed(1)}</td>`;
      html += '</tr>';
    });

    if(!rows.length){
      html += `<tr><td colspan="${maxK + 4}" style="text-align:center; opacity:0.4; padding:20px;">No data available</td></tr>`;
    }

    html += '</tbody></table></div>';

    document.getElementById('tp-table-area').innerHTML = html;

    // Sort click handlers
    document.querySelectorAll('.tp-tbl th[data-sort]').forEach(th=>{
      th.addEventListener('click', ()=>{
        const col = th.dataset.sort;
        if(sortCol === col) sortDir *= -1;
        else { sortCol = col; sortDir = (col==='name'||col==='opp') ? 1 : -1; }
        renderTable();
      });
    });
  }

  // ---- Games view ----
  let gmSortCol = 'exp';
  let gmSortDir = -1;
  const GM_MAX_RUNS = 10;

  function renderGamesTable(){
    const isCumul = currentMode === 'cumul';
    const area = document.getElementById('tp-games-area');

    if(!allGames.length){
      area.innerHTML = '<div class="tp-empty">No game data available.</div>';
      return;
    }

    // Build rows: one per team per game
    const rows = [];
    allGames.forEach(g => {
      const sim = g.simulation;
      if(!sim) return;
      const awayDist = sim.awayRunDist || [];
      const homeDist = sim.homeRunDist || [];

      function buildRow(abbrev, logo, pitcherName, dist, expRuns, winPct, side){
        // Pad/cap to GM_MAX_RUNS+1 entries
        const padded = [];
        for(let k = 0; k <= GM_MAX_RUNS; k++){
          padded.push((dist[k] || 0) * 100);
        }
        let displayDist;
        if(isCumul){
          displayDist = [];
          let cumSum = 0;
          for(let k = 0; k <= GM_MAX_RUNS; k++){
            displayDist.push((1 - cumSum) * 100);
            cumSum += padded[k] / 100;
          }
        } else {
          displayDist = padded;
        }
        return {
          gamePk: g.gamePk, abbrev, logo, pitcherName, side,
          dist: displayDist, expRuns, winPct,
          oppAbbrev: side === 'away' ? g.homeAbbrev : g.awayAbbrev,
        };
      }

      const awayPName = g.homePitcher ? g.homePitcher.name : '';
      const homePName = g.awayPitcher ? g.awayPitcher.name : '';
      rows.push(buildRow(g.awayAbbrev, g.awayLogo, awayPName, awayDist,
        sim.expectedScore?.away || 0, sim.awayWinPct * 100, 'away'));
      rows.push(buildRow(g.homeAbbrev, g.homeLogo, homePName, homeDist,
        sim.expectedScore?.home || 0, sim.homeWinPct * 100, 'home'));
    });

    // Sort
    rows.sort((a,b)=>{
      let av, bv;
      if(gmSortCol === 'team'){ return gmSortDir * a.abbrev.localeCompare(b.abbrev); }
      if(gmSortCol === 'win'){ av = a.winPct; bv = b.winPct; }
      else if(gmSortCol === 'exp'){ av = a.expRuns; bv = b.expRuns; }
      else { const k = parseInt(gmSortCol); av = a.dist[k]||0; bv = b.dist[k]||0; }
      return gmSortDir * ((av||0) - (bv||0));
    });

    // Build table
    const sc = col => col===gmSortCol ? 'sorted' : '';
    const arrow = col => col===gmSortCol ? (gmSortDir>0?'&#9650;':'&#9660;') : '&#9650;';

    let html = '<div class="gm-tbl-wrap"><table class="gm-tbl"><thead><tr>';
    html += `<th class="gm-team-col ${sc('team')}" data-sort="team">Team <span class="sort-arrow">${arrow('team')}</span></th>`;
    for(let k = 0; k <= GM_MAX_RUNS; k++){
      const label = isCumul ? `${k}+` : (k === GM_MAX_RUNS ? `${k}+` : k);
      html += `<th class="gm-num-col ${sc(String(k))}" data-sort="${k}">${label} <span class="sort-arrow">${arrow(String(k))}</span></th>`;
    }
    html += `<th class="gm-exp-col ${sc('exp')}" data-sort="exp">Exp <span class="sort-arrow">${arrow('exp')}</span></th>`;
    html += `<th class="gm-win-col ${sc('win')}" data-sort="win">Win% <span class="sort-arrow">${arrow('win')}</span></th>`;
    html += '</tr></thead><tbody>';

    let prevGamePk = null;
    rows.forEach((r, i) => {
      // Add separator between games (except before the very first row)
      if(prevGamePk !== null && r.gamePk !== prevGamePk){
        html += `<tr class="gm-separator"><td colspan="${GM_MAX_RUNS + 4}"></td></tr>`;
      }
      prevGamePk = r.gamePk;

      html += '<tr>';
      // Team cell
      html += `<td class="gm-team-td"><div class="gm-team-cell">`;
      if(r.logo) html += `<img class="gm-team-logo" src="${r.logo}" alt="" onerror="this.style.display='none'">`;
      html += `<div><span class="gm-team-name">${r.abbrev}</span>`;
      if(r.pitcherName) html += `<div class="gm-pitcher-name">vs ${r.pitcherName}</div>`;
      html += `</div></div></td>`;

      // Run distribution cells
      for(let k = 0; k <= GM_MAX_RUNS; k++){
        const pct = r.dist[k] || 0;
        html += `<td><span class="tp-pct" style="${pctBg(pct)}">${fmtPct(pct)}</span></td>`;
      }

      // Expected runs
      html += `<td class="gm-exp-td">${r.expRuns.toFixed(1)}</td>`;
      // Win %
      const winColor = r.winPct >= 55 ? 'color:#2d8a4e' : r.winPct <= 45 ? 'color:#c0392b' : '';
      html += `<td class="gm-win-td" style="${winColor}">${r.winPct.toFixed(0)}%</td>`;
      html += '</tr>';
    });

    if(!rows.length){
      html += `<tr><td colspan="${GM_MAX_RUNS + 4}" style="text-align:center;opacity:0.4;padding:20px;">No simulation data available</td></tr>`;
    }

    html += '</tbody></table></div>';
    area.innerHTML = html;

    // Sort handlers
    area.querySelectorAll('.gm-tbl th[data-sort]').forEach(th=>{
      th.addEventListener('click', ()=>{
        const col = th.dataset.sort;
        if(gmSortCol === col) gmSortDir *= -1;
        else { gmSortCol = col; gmSortDir = col === 'team' ? 1 : -1; }
        renderGamesTable();
      });
    });
  }

  // ---- NRFI view ----
  function renderNRFICards(){
    const area = document.getElementById('tp-nrfi-area');
    const gamesWithNRFI = allGames.filter(g => g.nrfi);

    if(!gamesWithNRFI.length){
      area.innerHTML = '<div class="tp-empty">No NRFI data available. Check back when lineups are posted.</div>';
      return;
    }

    // Sort by NRFI% descending (best NRFI bets first)
    gamesWithNRFI.sort((a,b) => (b.nrfi.nrfi_pct - a.nrfi.nrfi_pct));

    let html = '<div class="nf-grid">';
    gamesWithNRFI.forEach(g => {
      const n = g.nrfi;
      const nrfiPct = n.nrfi_pct * 100;
      const yrfiPct = n.yrfi_pct * 100;

      let badgeClass, badgeText;
      if(nrfiPct >= 58){ badgeClass='lean-nrfi'; badgeText='Lean NRFI'; }
      else if(nrfiPct <= 42){ badgeClass='lean-yrfi'; badgeText='Lean YRFI'; }
      else { badgeClass='tossup'; badgeText='Toss-Up'; }

      const awayClean = (1 - n.away_score_pct) * 100;
      const homeClean = (1 - n.home_score_pct) * 100;
      const awayScore = n.away_score_pct * 100;
      const homeScore = n.home_score_pct * 100;

      function statClass(clean){ return clean >= 75 ? 'clean' : clean <= 60 ? 'danger' : 'neutral'; }

      html += `<div class="nf-card">
        <div class="nf-card-header">
          <div class="nf-matchup">
            ${g.awayLogo ? `<img class="nf-team-logo" src="${g.awayLogo}" alt="" onerror="this.style.display='none'">` : ''}
            <span class="nf-abbrev">${g.awayAbbrev}</span>
            <span class="nf-at">@</span>
            ${g.homeLogo ? `<img class="nf-team-logo" src="${g.homeLogo}" alt="" onerror="this.style.display='none'">` : ''}
            <span class="nf-abbrev">${g.homeAbbrev}</span>
          </div>
          <span class="nf-time">${g.gameTime}</span>
        </div>
        <div class="nf-body">
          <span class="nf-badge ${badgeClass}">${badgeText}</span>
          <div class="nf-gauge">
            <div class="nf-gauge-nrfi" style="width:${nrfiPct}%">NRFI ${nrfiPct.toFixed(0)}%</div>
            <div class="nf-gauge-yrfi" style="width:${yrfiPct}%">YRFI ${yrfiPct.toFixed(0)}%</div>
          </div>
          <div class="nf-halves">
            <div class="nf-half">
              <span class="nf-half-label">Top 1</span>
              <span class="nf-half-pitcher">${n.home_pitcher_name || '?'}</span>
              <div class="nf-half-stats">
                <div class="nf-half-stat">
                  <div class="nf-half-stat-label">Clean</div>
                  <div class="nf-half-stat-val ${statClass(awayClean)}">${awayClean.toFixed(0)}%</div>
                </div>
                <div class="nf-half-stat">
                  <div class="nf-half-stat-label">Exp R</div>
                  <div class="nf-half-stat-val neutral">${n.away_exp_runs.toFixed(2)}</div>
                </div>
              </div>
            </div>
            <div class="nf-half">
              <span class="nf-half-label">Bot 1</span>
              <span class="nf-half-pitcher">${n.away_pitcher_name || '?'}</span>
              <div class="nf-half-stats">
                <div class="nf-half-stat">
                  <div class="nf-half-stat-label">Clean</div>
                  <div class="nf-half-stat-val ${statClass(homeClean)}">${homeClean.toFixed(0)}%</div>
                </div>
                <div class="nf-half-stat">
                  <div class="nf-half-stat-label">Exp R</div>
                  <div class="nf-half-stat-val neutral">${n.home_exp_runs.toFixed(2)}</div>
                </div>
              </div>
            </div>
          </div>`;

      // Odds recommendation
      const nrfiOdds = probToAmerican(n.nrfi_pct);
      const yrfiOdds = probToAmerican(n.yrfi_pct);

      if(nrfiPct >= 55){
        html += `<div class="nf-odds-row bet-nrfi">
          Bet NRFI at <span class="nf-odds-val">${fmtOdds(nrfiOdds)}</span> or better
        </div>`;
      } else if(yrfiPct >= 55){
        html += `<div class="nf-odds-row bet-yrfi">
          Bet YRFI at <span class="nf-odds-val">${fmtOdds(yrfiOdds)}</span> or better
        </div>`;
      } else {
        html += `<div class="nf-odds-row bet-skip">
          No edge — Fair: NRFI <span class="nf-odds-val">${fmtOdds(nrfiOdds)}</span> / YRFI <span class="nf-odds-val">${fmtOdds(yrfiOdds)}</span>
        </div>`;
      }

      html += `</div></div>`;
    });
    html += '</div>';
    area.innerHTML = html;
  }

  // ---- Stadium Conditions ----
  const TEAM_SVG = {
    'NYY':'yankees','BOS':'red_sox','NYM':'mets','BAL':'orioles',
    'TB':'rays','TBR':'rays','TOR':'blue_jays',
    'CWS':'white_sox','WSX':'white_sox','CLE':'guardians','DET':'tigers',
    'KC':'royals','KCR':'royals','MIN':'twins',
    'HOU':'astros','LAA':'angels','OAK':'athletics','ATH':'athletics',
    'SEA':'mariners','TEX':'rangers',
    'ATL':'braves','MIA':'marlins','PHI':'phillies',
    'WSH':'nationals','WSN':'nationals','WAS':'nationals',
    'CHC':'cubs','CIN':'reds','MIL':'brewers','PIT':'pirates','STL':'cardinals',
    'ARI':'diamondbacks','COL':'rockies','LAD':'dodgers',
    'SF':'giants','SFG':'giants','SD':'padres','SDP':'padres',
  };

  function stadiumSvgUrl(abbrev){
    const slug = TEAM_SVG[abbrev] || 'generic';
    return `/static/stadium_svgs/${slug}.svg`;
  }

  function windDegToCompass(deg){
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(deg / 22.5) % 16];
  }

  function fmtFactor(f){
    const pct = Math.round((f - 1.0) * 100);
    if(pct > 0) return `+${pct}%`;
    if(pct < 0) return `${pct}%`;
    return '0%';
  }

  function zoneChipClass(f){
    if(f >= 1.07) return 'pos-strong';
    if(f >= 1.03) return 'pos';
    if(f <= 0.93) return 'neg-strong';
    if(f <= 0.97) return 'neg';
    return 'neu';
  }

  function envBadgeClass(label){
    if(label === 'Dome (controlled)') return 'sc-env-dome';
    if(label === 'Very hitter-friendly') return 'sc-env-hitter-very';
    if(label === 'Hitter-friendly') return 'sc-env-hitter';
    if(label === 'Very pitcher-friendly') return 'sc-env-pitcher-very';
    if(label === 'Pitcher-friendly') return 'sc-env-pitcher';
    return 'sc-env-neutral';
  }

  function renderStadiumCard(g){
    const w = g.weather || {};
    const imp = w.impact || {};
    const dome = w.dome;

    const awayLogo = (g.away||{}).logo || '';
    const homeLogo = (g.home||{}).logo || '';
    const awayAbbrev = (g.away||{}).abbrev || '';
    const homeAbbrev = (g.home||{}).abbrev || '';
    const venueName = g.venue || 'Unknown Venue';
    const venueLoc = g.venueLocation || '';
    const label = imp.label || 'Neutral';
    const envCls = envBadgeClass(label);

    const lf  = imp.lf_hr_factor  || 1;
    const lcf = imp.lcf_hr_factor || 1;
    const cf  = imp.cf_hr_factor  || 1;
    const rcf = imp.rcf_hr_factor || 1;
    const rf  = imp.rf_hr_factor  || 1;
    const xbh = imp.xbh_factor || 1;

    const svgUrl = stadiumSvgUrl(homeAbbrev);

    // Stadium visual: SVG + overlaid HR zone chips + env badge
    // Zone chips always shown — even for domes, elevation + park dims create factors
    const domeNote = dome ? `<div class="sc-dome-label">Park factors only · No wind</div>` : '';
    const zoneHtml = `
      <div class="sc-zone-overlay">
        <div class="sc-zone-chip sc-zone-lf ${zoneChipClass(lf)}">
          <span class="sc-zone-chip-label">LF</span>
          <span class="sc-zone-chip-val">${fmtFactor(lf)}</span>
        </div>
        <div class="sc-zone-chip sc-zone-lcf ${zoneChipClass(lcf)}">
          <span class="sc-zone-chip-label">LCF</span>
          <span class="sc-zone-chip-val">${fmtFactor(lcf)}</span>
        </div>
        <div class="sc-zone-chip sc-zone-cf ${zoneChipClass(cf)}">
          <span class="sc-zone-chip-label">CF</span>
          <span class="sc-zone-chip-val">${fmtFactor(cf)}</span>
        </div>
        <div class="sc-zone-chip sc-zone-rcf ${zoneChipClass(rcf)}">
          <span class="sc-zone-chip-label">RCF</span>
          <span class="sc-zone-chip-val">${fmtFactor(rcf)}</span>
        </div>
        <div class="sc-zone-chip sc-zone-rf ${zoneChipClass(rf)}">
          <span class="sc-zone-chip-label">RF</span>
          <span class="sc-zone-chip-val">${fmtFactor(rf)}</span>
        </div>
        ${domeNote}
      </div>`;

    // Weather footer items
    let weatherHtml = '';
    if(!dome && w.condition){
      const windDir = windDegToCompass(w.wind_dir || 0);
      const cfMph = (imp.components||{}).cf_wind_mph || 0;
      const cfSign = cfMph >= 0 ? `out +${cfMph.toFixed(0)}` : `in ${cfMph.toFixed(0)}`;
      weatherHtml = `
        <div class="sc-weather-row">
          <div class="sc-weather-item">
            <span class="sc-weather-label">Cond</span>
            <span>${w.condition}</span>
          </div>
          <div class="sc-weather-item">
            <span class="sc-weather-label">Temp</span>
            <span>${w.temp_f}°F</span>
          </div>
          <div class="sc-weather-item">
            <span class="sc-weather-label">Wind</span>
            <span>${w.wind_mph} mph ${windDir} · CF ${cfSign} mph</span>
          </div>
        </div>`;
    } else if(dome){
      const xbhPct = xbh !== 1 ? ` · XBH Adj: ${xbh >= 1 ? '+' : ''}${Math.round((xbh-1)*100)}%` : '';
      weatherHtml = `
        <div class="sc-weather-row">
          <div class="sc-weather-item">
            <span class="sc-weather-label">Roof</span>
            <span>${label}${xbhPct}</span>
          </div>
        </div>`;
    }

    return `
      <div class="sc-card">
        <div class="sc-card-header">
          <div class="sc-matchup">
            ${awayLogo ? `<img class="sc-team-logo" src="${awayLogo}" alt="" onerror="this.style.display='none'">` : ''}
            <span class="sc-abbrev">${awayAbbrev}</span>
            <span class="sc-at">@</span>
            ${homeLogo ? `<img class="sc-team-logo" src="${homeLogo}" alt="" onerror="this.style.display='none'">` : ''}
            <span class="sc-abbrev">${homeAbbrev}</span>
          </div>
          <span class="sc-time">${g.timeLocal || ''}</span>
        </div>

        <div class="sc-stadium-wrap">
          <img class="sc-stadium-svg-img" src="${svgUrl}" alt="${venueName}" onerror="this.style.opacity='0'">
          ${zoneHtml}
          <div class="sc-env-badge-row">
            <span class="sc-env-badge ${envCls}">${label}</span>
          </div>
        </div>

        <div class="sc-card-footer">
          <div class="sc-venue-row">
            <span class="sc-venue-name">${venueName}</span>
            ${venueLoc ? `<span class="sc-venue-loc">${venueLoc}</span>` : ''}
          </div>
          ${weatherHtml}
          <div class="sc-xbh-row">
            <span>XBH Adj:</span>
            <span class="sc-xbh-val">${fmtFactor(xbh)}</span>
          </div>
        </div>
      </div>`;
  }

  function loadStadiumConditions(){
    const area = document.getElementById('tp-stadium-area');
    if(stadiumData){
      area.innerHTML = `<div class="sc-grid">${stadiumData.map(renderStadiumCard).join('')}</div>`;
      return;
    }
    area.innerHTML = '<div class="sc-loading">Fetching weather and park data…</div>';
    const dateVal = (document.querySelector('input[name="date"]') || {}).value || '';
    const qs = dateVal ? `?date=${dateVal}` : '';
    fetch(`/todays-projections/stadium-conditions.json${qs}`)
      .then(r => r.json())
      .then(data => {
        stadiumData = data;
        area.innerHTML = data.length
          ? `<div class="sc-grid">${data.map(renderStadiumCard).join('')}</div>`
          : '<div class="sc-loading">No games found for this date.</div>';
      })
      .catch(() => {
        area.innerHTML = '<div class="sc-loading">Failed to load stadium conditions.</div>';
      });
  }

  // Date navigation
  const prevBtn = document.getElementById('tp-prev');
  const nextBtn = document.getElementById('tp-next');
  const dateInput = document.querySelector('input[name="date"]');
  function adjDate(days){
    if(!dateInput||!dateInput.value) return;
    const dt = new Date(dateInput.value+'T00:00:00');
    dt.setDate(dt.getDate()+days);
    dateInput.value = dt.toISOString().slice(0,10);
    if(dateInput.form) dateInput.form.submit();
  }
  if(prevBtn) prevBtn.addEventListener('click', ()=>adjDate(-1));
  if(nextBtn) nextBtn.addEventListener('click', ()=>adjDate(1));
})();
</script>

{% endblock %}
