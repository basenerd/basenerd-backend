{% extends "base.html" %}
{% block content %}

<style>
  .tp-header{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  .tp-date-form{ display:flex; gap:10px; align-items:center; }
  .tp-loading{ text-align:center; padding:60px 20px; opacity:0.5; }
  .tp-empty{ text-align:center; padding:40px 20px; opacity:0.5; }

  /* Game section */
  .tp-game{
    margin-top:18px; border:1px solid rgba(255,255,255,0.06);
    border-radius:12px; overflow:hidden; background:rgba(255,255,255,0.01);
  }
  .tp-game-header{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:12px 16px; background:rgba(255,255,255,0.03);
    border-bottom:1px solid rgba(255,255,255,0.06); cursor:pointer;
  }
  .tp-game-header:hover{ background:rgba(255,255,255,0.05); }
  .tp-game-teams{ font-weight:800; font-size:1rem; }
  .tp-game-time{ font-size:0.75rem; opacity:0.5; font-family:monospace; }
  .tp-game-body{ padding:16px; display:none; }
  .tp-game.open .tp-game-body{ display:block; }

  /* View toggle */
  .tp-view-tabs{
    display:flex; gap:0; border-radius:8px; overflow:hidden;
    border:1px solid rgba(255,255,255,0.1); margin-bottom:14px; width:fit-content;
  }
  .tp-view-btn{
    padding:6px 16px; font-size:0.78rem; font-weight:700; cursor:pointer;
    background:transparent; color:rgba(255,255,255,0.5); border:none;
    transition: all 0.15s;
  }
  .tp-view-btn.active{ background:rgba(255,255,255,0.12); color:#fff; }

  /* Stat toggle */
  .tp-stat-toggle{
    display:flex; gap:0; border-radius:6px; overflow:hidden;
    border:1px solid rgba(255,255,255,0.1); margin-bottom:12px; width:fit-content;
  }
  .tp-stat-btn{
    padding:5px 12px; font-size:0.72rem; font-weight:700; cursor:pointer;
    background:transparent; color:rgba(255,255,255,0.45); border:none;
    transition: all 0.15s; white-space:nowrap;
  }
  .tp-stat-btn.active{ background:rgba(255,255,255,0.12); color:#fff; }
  .tp-stat-btn:hover:not(.active){ background:rgba(255,255,255,0.05); }

  /* Table */
  .tp-tbl-wrap{
    overflow-x:auto; -webkit-overflow-scrolling:touch;
  }
  .tp-tbl{
    width:100%; border-collapse:collapse; font-size:0.8rem;
  }
  .tp-tbl th{
    text-align:center; padding:6px 4px; font-size:0.68rem; font-weight:700;
    text-transform:uppercase; letter-spacing:0.3px; opacity:0.5;
    border-bottom:2px solid rgba(255,255,255,0.08);
    white-space:nowrap;
  }
  .tp-tbl th.player-col{
    text-align:left; min-width:180px;
  }
  .tp-tbl th.num-col{
    min-width:48px; width:48px;
  }
  .tp-tbl th.exp-col{
    min-width:52px; border-left:2px solid rgba(255,255,255,0.06);
  }
  .tp-tbl td{
    padding:8px 4px; border-bottom:1px solid rgba(255,255,255,0.04);
    text-align:center; font-variant-numeric:tabular-nums;
  }
  .tp-tbl td.player-td{
    text-align:left;
  }
  .tp-tbl td.exp-td{
    border-left:2px solid rgba(255,255,255,0.06);
    font-weight:800; color:#f0c040;
  }
  .tp-tbl tr:hover{
    background:rgba(255,255,255,0.03);
  }

  /* Player cell */
  .tp-player-cell{
    display:flex; align-items:center; gap:8px;
  }
  .tp-team-logo{
    width:22px; height:22px; flex-shrink:0;
  }
  .tp-player-img{
    width:32px; height:32px; border-radius:50%; object-fit:cover;
    border:1.5px solid rgba(255,255,255,0.08); flex-shrink:0;
  }
  .tp-player-info{
    min-width:0;
  }
  .tp-player-name{
    font-weight:700; font-size:0.8rem; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
  }
  .tp-player-meta{
    font-size:0.65rem; opacity:0.45;
  }

  /* Pct cell coloring */
  .tp-pct{
    font-size:0.78rem; font-weight:600;
  }
  .tp-pct-high{ color:#51cf66; }
  .tp-pct-med{ color:rgba(255,255,255,0.7); }
  .tp-pct-low{ opacity:0.35; }

  /* Section title */
  .tp-section-label{
    font-weight:800; font-size:0.85rem; margin:16px 0 8px; opacity:0.6;
    text-transform:uppercase; letter-spacing:0.5px;
  }

  @media(max-width:640px){
    .tp-game-header{ padding:10px 12px; }
    .tp-game-body{ padding:10px; }
    .tp-stat-btn{ padding:4px 8px; font-size:0.65rem; }
    .tp-tbl{ font-size:0.72rem; }
    .tp-tbl th{ padding:5px 3px; font-size:0.6rem; }
    .tp-tbl td{ padding:6px 3px; }
    .tp-tbl th.num-col{ min-width:38px; width:38px; }
    .tp-player-img{ width:26px; height:26px; }
    .tp-team-logo{ width:18px; height:18px; }
    .tp-player-name{ font-size:0.72rem; }
  }
</style>

<div class="card">
  <div class="card-header tp-header">
    <div>
      <div class="card-title">Today's Projections</div>
      <div class="card-subtitle">Stat probability distributions for every pitcher and hitter</div>
    </div>
    <form method="get" action="/todays-projections" class="tp-date-form">
      <button type="button" class="date-arrow" id="tp-prev">&lsaquo;</button>
      <input class="input" type="date" name="date" value="{{ date }}" aria-label="Pick date" />
      <button type="button" class="date-arrow" id="tp-next">&rsaquo;</button>
      <button class="btn" type="submit">Go</button>
    </form>
  </div>
</div>

<div id="tp-loading" class="tp-loading">Loading games and projections...</div>
<div id="tp-content"></div>

<script>
(function(){
  const DATE = {{ date | tojson }};
  const GAMES = {{ games | tojson }};

  // ---- Poisson math ----
  function poissonPMF(lam, k){
    if(lam <= 0) return k === 0 ? 1 : 0;
    let logP = -lam + k * Math.log(lam);
    for(let i = 2; i <= k; i++) logP -= Math.log(i);
    return Math.exp(logP);
  }

  function computeDist(lam, maxK){
    const dist = [];
    let cum = 0;
    for(let k = 0; k <= maxK; k++){
      const p = poissonPMF(lam, k);
      dist.push({k, pct: p * 100});
      cum += p;
    }
    const rem = (1 - cum) * 100;
    if(rem > 0.5) dist[dist.length-1].pct += rem; // fold remainder into last bucket
    return dist;
  }

  // ---- Stat definitions ----
  const P_STATS = [
    {key:'k',  label:'Strikeouts',     short:'K',  maxK:10},
    {key:'ip', label:'Innings Pitched', short:'IP', maxK:8},
    {key:'h',  label:'Hits Allowed',    short:'H',  maxK:9},
    {key:'bb', label:'Walks',           short:'BB', maxK:5},
    {key:'hr', label:'Homers Allowed',  short:'HR', maxK:3},
  ];
  const B_STATS = [
    {key:'h',   label:'Hits',      short:'H',   maxK:4},
    {key:'hr',  label:'Home Runs', short:'HR',  maxK:3},
    {key:'rbi', label:'RBIs',      short:'RBI', maxK:5},
  ];

  // ---- Lambda computations ----
  function pitcherLambdas(side){
    const batters = (side.batters||[]).filter(b => b.probs && Object.keys(b.probs).length);
    if(!batters.length) return null;
    const n = batters.length;
    const isSpring = side._isSpring;
    const estBF = isSpring ? 12 : 24;
    const avgK   = batters.reduce((s,b)=>s+(b.probs.K||0),0)/n;
    const avgBB  = batters.reduce((s,b)=>s+(b.probs.BB||0)+(b.probs.IBB||0)+(b.probs.HBP||0),0)/n;
    const avgHit = batters.reduce((s,b)=>s+(b.summary?.hit_pct||0),0)/n;
    const avgHR  = batters.reduce((s,b)=>s+(b.probs.HR||0),0)/n;
    const avgOut = batters.reduce((s,b)=>s+(b.probs.OUT||0)+(b.probs.K||0),0)/n;
    return { k: estBF*avgK, ip: estBF*avgOut/3, h: estBF*avgHit, bb: estBF*avgBB, hr: estBF*avgHR };
  }

  function batterLambdas(b){
    const probs = b.probs||{};
    const summary = b.summary||{};
    const sl = b.statline||{};
    if(!sl.pa) return null;
    return {
      h:   sl.pa * (summary.hit_pct||0),
      hr:  sl.pa * (probs.HR||0),
      rbi: sl.rbi || sl.pa * ((probs.HR||0)*1.5 + (probs['2B']||0)*0.5 + (probs['3B']||0)*0.8 + (probs['1B']||0)*0.15),
    };
  }

  // ---- Formatting helpers ----
  function fmtPct(pct){
    if(pct >= 10) return pct.toFixed(0) + '%';
    if(pct >= 1)  return pct.toFixed(1) + '%';
    if(pct >= 0.1) return pct.toFixed(1) + '%';
    return '<1%';
  }
  function pctClass(pct){
    if(pct >= 20) return 'tp-pct-high';
    if(pct >= 5)  return 'tp-pct-med';
    return 'tp-pct-low';
  }

  function teamLogoUrl(teamId){
    return teamId ? `https://www.mlbstatic.com/team-logos/${teamId}.svg` : '';
  }
  function headshotUrl(playerId){
    return `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_80,q_auto:best/v1/people/${playerId}/headshot/67/current`;
  }

  // ---- Build table for a stat ----
  function buildTable(players, stat, type){
    const maxK = stat.maxK;
    // Compute distributions for all players
    const rows = players.map(p => {
      const lam = p.lambdas ? (p.lambdas[stat.key]||0) : 0;
      const dist = computeDist(lam, maxK);
      return { ...p, dist, lam };
    });

    // Column headers: 0, 1, 2, ... maxK+
    let html = '<div class="tp-tbl-wrap"><table class="tp-tbl"><thead><tr>';
    html += '<th class="player-col">Player</th>';
    for(let k = 0; k <= maxK; k++){
      const label = k === maxK ? `${k}+` : k;
      html += `<th class="num-col">${label}</th>`;
    }
    html += '<th class="exp-col">Exp</th>';
    html += '</tr></thead><tbody>';

    rows.forEach(r => {
      html += '<tr>';
      // Player cell
      html += `<td class="player-td"><div class="tp-player-cell">`;
      if(r.logoUrl) html += `<img class="tp-team-logo" src="${r.logoUrl}" alt="" onerror="this.style.display='none'">`;
      html += `<img class="tp-player-img" src="${headshotUrl(r.id)}" alt="" onerror="this.style.display='none'">`;
      html += `<div class="tp-player-info"><div class="tp-player-name">${r.name}</div>`;
      html += `<div class="tp-player-meta">${r.meta}</div></div>`;
      html += '</div></td>';

      // Pct cells
      r.dist.forEach(d => {
        html += `<td><span class="tp-pct ${pctClass(d.pct)}">${fmtPct(d.pct)}</span></td>`;
      });
      // If dist is shorter than maxK+1 columns (no remainder bucket), pad
      for(let i = r.dist.length; i <= maxK; i++){
        html += '<td><span class="tp-pct tp-pct-low"><1%</span></td>';
      }

      // Expected value
      html += `<td class="exp-td">${r.lam.toFixed(1)}</td>`;
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    return html;
  }

  // ---- Filter games ----
  const previewGames = GAMES.filter(g=>{
    const ds = (g.detailedState||'').toLowerCase();
    return ds.includes('scheduled') || ds.includes('warmup') || ds.includes('pre-game')
      || ds.includes('preview') || ds.includes('in progress') || ds.includes('live');
  });

  if(!previewGames.length){
    document.getElementById('tp-loading').style.display = 'none';
    document.getElementById('tp-content').innerHTML = '<div class="tp-empty">No upcoming games for this date.</div>';
  } else {
    // Build game shells
    let shellHtml = '';
    previewGames.forEach((g,gi)=>{
      const awayLogo = g.away?.logo || '';
      const homeLogo = g.home?.logo || '';
      shellHtml += `<div class="tp-game open" id="tp-game-${gi}">
        <div class="tp-game-header" data-game-idx="${gi}">
          <div class="tp-game-teams">
            ${awayLogo ? `<img src="${awayLogo}" style="height:20px;width:20px;vertical-align:middle;margin-right:4px" alt="">` : ''}
            ${g.away.abbrev} @
            ${homeLogo ? `<img src="${homeLogo}" style="height:20px;width:20px;vertical-align:middle;margin:0 4px" alt="">` : ''}
            ${g.home.abbrev}
          </div>
          <div class="tp-game-time">${g.timeLocal || g.statusPill || ''}</div>
        </div>
        <div class="tp-game-body" id="tp-game-body-${gi}">
          <div style="opacity:0.5; font-size:0.8rem;">Loading projections...</div>
        </div>
      </div>`;
    });
    document.getElementById('tp-content').innerHTML = shellHtml;
    document.getElementById('tp-loading').style.display = 'none';

    // Toggle game collapse
    document.querySelectorAll('.tp-game-header').forEach(hdr=>{
      hdr.addEventListener('click', ()=>{ hdr.parentElement.classList.toggle('open'); });
    });

    // Fetch pregame data for each game
    previewGames.forEach((g,gi)=>{
      fetch(`/game/${g.gamePk}/pregame.json`)
        .then(r=>r.json())
        .then(d=> renderGameProjections(d, gi, g))
        .catch(()=>{
          document.getElementById(`tp-game-body-${gi}`).innerHTML =
            '<div style="opacity:0.4; font-size:0.8rem;">Projections unavailable (lineups may not be posted yet).</div>';
        });
    });
  }

  function renderGameProjections(d, gi, gameMeta){
    const body = document.getElementById(`tp-game-body-${gi}`);
    if(!d.ok || !d.lineups_posted){
      body.innerHTML = '<div style="opacity:0.4; font-size:0.8rem;">Lineups not yet posted. Check back closer to game time.</div>';
      return;
    }

    const awayLogo = gameMeta.away?.logo || teamLogoUrl(d.away_team_id);
    const homeLogo = gameMeta.home?.logo || teamLogoUrl(d.home_team_id);

    // Build pitcher player rows
    // d.home side = away pitcher's matchup data, d.away side = home pitcher's matchup data
    const pitcherRows = [];
    [{side: d.home, pitcher: d.home?.pitcher, abbrev: d.away_abbrev, logo: awayLogo, statline: d.home?.pitcher_statline},
     {side: d.away, pitcher: d.away?.pitcher, abbrev: d.home_abbrev, logo: homeLogo, statline: d.away?.pitcher_statline}]
    .forEach(cfg => {
      if(!cfg.pitcher) return;
      cfg.side._isSpring = d.is_spring;
      const lam = pitcherLambdas(cfg.side);
      if(!lam) return;
      const hand = cfg.pitcher.throws === 'L' ? 'LHP' : 'RHP';
      pitcherRows.push({
        id: cfg.pitcher.id,
        name: cfg.pitcher.name,
        meta: `${cfg.abbrev} · ${hand}`,
        logoUrl: cfg.logo,
        lambdas: lam,
      });
    });

    // Build batter player rows
    const batterRows = [];
    [{batters: d.away?.batters||[], abbrev: d.away_abbrev, logo: awayLogo},
     {batters: d.home?.batters||[], abbrev: d.home_abbrev, logo: homeLogo}]
    .forEach(cfg => {
      cfg.batters.forEach(b => {
        const lam = batterLambdas(b);
        if(!lam) return;
        batterRows.push({
          id: b.id,
          name: b.name,
          meta: `${cfg.abbrev} · ${b.stand} ${b.pos}`,
          logoUrl: cfg.logo,
          lambdas: lam,
        });
      });
    });

    // Render shell with view toggle + stat toggles
    let html = '';

    // View tabs
    html += `<div class="tp-view-tabs">
      <button class="tp-view-btn active" data-view="pitchers" data-gi="${gi}">Pitchers</button>
      <button class="tp-view-btn" data-view="batters" data-gi="${gi}">Batters</button>
    </div>`;

    // Pitchers panel
    html += `<div id="tp-pitchers-${gi}">`;
    html += `<div class="tp-stat-toggle" id="tp-pstat-toggle-${gi}">`;
    P_STATS.forEach((s,i) => {
      html += `<button class="tp-stat-btn ${i===0?'active':''}" data-stat="${s.key}" data-gi="${gi}" data-type="p">${s.label}</button>`;
    });
    html += '</div>';
    html += `<div id="tp-ptable-${gi}"></div>`;
    html += '</div>';

    // Batters panel
    html += `<div id="tp-batters-${gi}" style="display:none">`;
    html += `<div class="tp-stat-toggle" id="tp-bstat-toggle-${gi}">`;
    B_STATS.forEach((s,i) => {
      html += `<button class="tp-stat-btn ${i===0?'active':''}" data-stat="${s.key}" data-gi="${gi}" data-type="b">${s.label}</button>`;
    });
    html += '</div>';
    html += `<div id="tp-btable-${gi}"></div>`;
    html += '</div>';

    body.innerHTML = html;

    // Render initial tables
    function renderPitcherTable(statKey){
      const stat = P_STATS.find(s=>s.key===statKey);
      document.getElementById(`tp-ptable-${gi}`).innerHTML = buildTable(pitcherRows, stat, 'pitcher');
    }
    function renderBatterTable(statKey){
      const stat = B_STATS.find(s=>s.key===statKey);
      document.getElementById(`tp-btable-${gi}`).innerHTML = buildTable(batterRows, stat, 'batter');
    }

    renderPitcherTable(P_STATS[0].key);
    renderBatterTable(B_STATS[0].key);

    // Stat toggle handlers
    body.querySelectorAll(`#tp-pstat-toggle-${gi} .tp-stat-btn`).forEach(btn=>{
      btn.addEventListener('click', ()=>{
        body.querySelectorAll(`#tp-pstat-toggle-${gi} .tp-stat-btn`).forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderPitcherTable(btn.dataset.stat);
      });
    });
    body.querySelectorAll(`#tp-bstat-toggle-${gi} .tp-stat-btn`).forEach(btn=>{
      btn.addEventListener('click', ()=>{
        body.querySelectorAll(`#tp-bstat-toggle-${gi} .tp-stat-btn`).forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderBatterTable(btn.dataset.stat);
      });
    });

    // View toggle handlers
    body.querySelectorAll('.tp-view-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        body.querySelectorAll('.tp-view-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const v = btn.dataset.view;
        document.getElementById(`tp-pitchers-${gi}`).style.display = v==='pitchers'?'':'none';
        document.getElementById(`tp-batters-${gi}`).style.display = v==='batters'?'':'none';
      });
    });
  }

  // Date navigation
  const prevBtn = document.getElementById('tp-prev');
  const nextBtn = document.getElementById('tp-next');
  const dateInput = document.querySelector('input[name="date"]');
  function adjDate(days){
    if(!dateInput||!dateInput.value) return;
    const dt = new Date(dateInput.value+'T00:00:00');
    dt.setDate(dt.getDate()+days);
    dateInput.value = dt.toISOString().slice(0,10);
    if(dateInput.form) dateInput.form.submit();
  }
  if(prevBtn) prevBtn.addEventListener('click', ()=>adjDate(-1));
  if(nextBtn) nextBtn.addEventListener('click', ()=>adjDate(1));
})();
</script>

{% endblock %}
