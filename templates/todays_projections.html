{% extends "base.html" %}
{% block content %}

<style>
  .tp-header{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  .tp-date-form{ display:flex; gap:10px; align-items:center; }
  .tp-loading{ text-align:center; padding:60px 20px; opacity:0.5; }
  .tp-empty{ text-align:center; padding:40px 20px; opacity:0.5; }

  /* Controls row */
  .tp-controls{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    margin-top:16px; margin-bottom:14px;
    padding:12px 16px;
    background:rgba(0,0,0,0.015);
    border:1px solid var(--border, rgba(0,0,0,0.08));
    border-radius:10px;
  }
  .tp-controls-label{
    font-size:0.72rem; font-weight:700; color:#555; text-transform:uppercase;
    letter-spacing:0.5px; margin-right:4px;
  }
  .tp-controls-row{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  }

  /* View toggle */
  .tp-view-tabs{
    display:flex; gap:0; border-radius:8px; overflow:hidden;
    border:1px solid var(--border, rgba(0,0,0,0.1));
  }
  .tp-view-btn{
    padding:7px 18px; font-size:0.8rem; font-weight:700; cursor:pointer;
    background:transparent; color:#111; border:none;
    transition: all 0.15s;
  }
  .tp-view-btn.active{ background:rgba(240,192,64,0.25); color:#b8860b; }
  .tp-view-btn:hover:not(.active){ background:rgba(0,0,0,0.04); }

  /* Stat toggle */
  .tp-stat-toggle{
    display:flex; gap:0; border-radius:6px; overflow:hidden;
    border:1px solid var(--border, rgba(0,0,0,0.1));
  }
  .tp-stat-btn{
    padding:6px 14px; font-size:0.75rem; font-weight:700; cursor:pointer;
    background:rgba(0,0,0,0.02); color:#111; border:none;
    border-right:1px solid var(--border, rgba(0,0,0,0.06));
    transition: all 0.15s; white-space:nowrap;
  }
  .tp-stat-btn:last-child{ border-right:none; }
  .tp-stat-btn.active{ background:rgba(240,192,64,0.25); color:#b8860b; }
  .tp-stat-btn:hover:not(.active){ background:rgba(0,0,0,0.05); }

  /* Table */
  .tp-tbl-wrap{
    overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:4px;
  }
  .tp-tbl{
    width:100%; border-collapse:collapse; font-size:0.8rem;
  }
  .tp-tbl th{
    text-align:center; padding:8px 5px; font-size:0.7rem; font-weight:700;
    text-transform:uppercase; letter-spacing:0.3px; opacity:0.5;
    border-bottom:2px solid var(--border, rgba(0,0,0,0.08));
    white-space:nowrap; cursor:pointer; user-select:none;
    position:relative;
  }
  .tp-tbl th:hover{ opacity:0.8; }
  .tp-tbl th.player-col{
    text-align:left; min-width:190px; cursor:pointer;
  }
  .tp-tbl th.opp-col{
    text-align:left; min-width:100px;
  }
  .tp-tbl th.num-col{
    min-width:50px; width:50px;
  }
  .tp-tbl th.exp-col{
    min-width:54px; border-left:2px solid rgba(0,0,0,0.06);
  }
  .tp-tbl th .sort-arrow{
    font-size:0.6rem; margin-left:2px; opacity:0.4;
  }
  .tp-tbl th.sorted .sort-arrow{ opacity:1; color:#f0c040; }

  .tp-tbl td{
    padding:8px 5px; border-bottom:1px solid rgba(0,0,0,0.04);
    text-align:center; font-variant-numeric:tabular-nums;
  }
  .tp-tbl td.player-td{
    text-align:left;
  }
  .tp-tbl td.opp-td{
    text-align:left;
  }
  .tp-tbl td.exp-td{
    border-left:2px solid rgba(0,0,0,0.06);
    font-weight:800; color:#f0c040;
  }
  .tp-tbl tbody tr:hover{
    background:rgba(0,0,0,0.02);
  }

  /* Player cell */
  .tp-player-cell{
    display:flex; align-items:center; gap:8px;
  }
  .tp-team-logo{
    width:22px; height:22px; flex-shrink:0;
  }
  .tp-player-img{
    width:32px; height:32px; border-radius:50%; object-fit:cover;
    border:1.5px solid rgba(0,0,0,0.08); flex-shrink:0;
  }
  .tp-player-info{ min-width:0; }
  .tp-player-name{
    font-weight:700; font-size:0.8rem; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
  }
  .tp-player-meta{
    font-size:0.65rem; opacity:0.45;
  }

  /* Opponent cell */
  .tp-opp-cell{
    display:flex; align-items:center; gap:6px;
  }
  .tp-opp-logo{
    width:18px; height:18px; flex-shrink:0;
  }
  .tp-opp-name{
    font-size:0.78rem; font-weight:600;
  }

  /* Pct cell coloring — background tint for magnitude, text always visible */
  .tp-pct{
    font-size:0.78rem; font-weight:700; color:#111;
    display:inline-block; padding:2px 4px; border-radius:4px;
    min-width:36px; text-align:center;
  }

  @media(max-width:640px){
    /* Controls: stack vertically */
    .tp-controls{
      flex-direction:column; align-items:stretch; gap:10px;
      padding:10px 12px;
    }
    .tp-controls-label{ margin-bottom:2px; }
    .tp-controls-row{
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    }

    /* Stat toggle: allow wrapping */
    .tp-stat-toggle{ flex-wrap:wrap; gap:4px; }
    .tp-stat-btn{
      padding:8px 12px; font-size:0.72rem;
      min-height:38px;
    }
    .tp-view-btn{
      padding:8px 14px; font-size:0.75rem;
      min-height:38px;
    }

    /* Header: stack title and date form */
    .tp-header{ flex-direction:column; align-items:stretch; }
    .tp-date-form{ width:100%; justify-content:center; }

    /* Table */
    .tp-tbl{ font-size:0.72rem; }
    .tp-tbl th{ padding:6px 4px; font-size:0.62rem; }
    .tp-tbl td{ padding:6px 4px; }
    .tp-tbl th.num-col{ min-width:42px; width:42px; }
    .tp-tbl th.player-col{ min-width:140px; }
    .tp-tbl th.opp-col{ min-width:70px; }

    /* Sticky player column */
    .tp-tbl th.player-col,
    .tp-tbl td.player-td{
      position:sticky; left:0; z-index:2;
      background:var(--card, #fff);
      box-shadow:2px 0 4px rgba(0,0,0,0.06);
    }

    .tp-player-img{ width:24px; height:24px; }
    .tp-team-logo{ width:16px; height:16px; }
    .tp-player-name{ font-size:0.7rem; max-width:90px; }
    .tp-player-meta{ font-size:0.6rem; }
    .tp-pct{ font-size:0.68rem; min-width:32px; padding:2px 3px; }
    .tp-opp-name{ font-size:0.7rem; }
    .tp-opp-logo{ width:16px; height:16px; }
  }

  @media(max-width:400px){
    .tp-stat-btn{ padding:6px 8px; font-size:0.65rem; }
    .tp-view-btn{ padding:6px 10px; font-size:0.68rem; }
    .tp-tbl th.player-col{ min-width:120px; }
    .tp-player-name{ max-width:70px; }
    .tp-player-img{ display:none; }
  }

  /* ---- Stadium Conditions ---- */
  .sc-grid{
    display:grid; gap:12px;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    margin-top:4px;
  }
  .sc-card{
    border:1px solid var(--border, rgba(0,0,0,0.09));
    border-radius:12px;
    overflow:hidden;
    background:var(--card, #fff);
  }
  .sc-card-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px 8px;
    border-bottom:1px solid rgba(0,0,0,0.06);
    gap:8px;
  }
  .sc-matchup{
    display:flex; align-items:center; gap:6px; flex:1; min-width:0;
  }
  .sc-team-logo{ width:24px; height:24px; flex-shrink:0; }
  .sc-at{ font-size:0.7rem; opacity:0.4; font-weight:700; }
  .sc-abbrev{ font-size:0.85rem; font-weight:800; }
  .sc-time{ font-size:0.72rem; opacity:0.45; white-space:nowrap; }
  .sc-venue-block{
    padding:6px 14px 8px;
    border-bottom:1px solid rgba(0,0,0,0.05);
  }
  .sc-venue-name{
    font-size:0.78rem; font-weight:700;
  }
  .sc-venue-loc{
    font-size:0.68rem; opacity:0.45;
  }
  .sc-body{ padding:10px 14px; display:flex; flex-direction:column; gap:8px; }
  .sc-env-badge{
    display:inline-block; padding:3px 10px; border-radius:20px;
    font-size:0.72rem; font-weight:800; letter-spacing:0.2px;
    align-self:flex-start;
  }
  .sc-env-hitter-very{ background:rgba(81,207,102,0.22); color:#1a7a36; }
  .sc-env-hitter    { background:rgba(81,207,102,0.13); color:#2a9048; }
  .sc-env-neutral   { background:rgba(0,0,0,0.06);       color:#555; }
  .sc-env-pitcher   { background:rgba(99,149,255,0.13);  color:#1a4fa8; }
  .sc-env-pitcher-very{ background:rgba(99,149,255,0.22); color:#1035a0; }
  .sc-env-dome      { background:rgba(180,180,180,0.18); color:#555; }

  .sc-weather-row{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .sc-weather-item{
    display:flex; align-items:center; gap:4px;
    font-size:0.75rem; font-weight:600;
  }
  .sc-weather-label{ font-size:0.65rem; opacity:0.45; text-transform:uppercase; letter-spacing:0.3px; }

  .sc-hr-grid{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;
  }
  .sc-hr-zone{
    text-align:center; padding:6px 4px;
    border-radius:8px; border:1px solid rgba(0,0,0,0.07);
  }
  .sc-hr-zone-label{
    font-size:0.62rem; font-weight:700; opacity:0.45; text-transform:uppercase;
    letter-spacing:0.3px; margin-bottom:2px;
  }
  .sc-hr-val{
    font-size:0.85rem; font-weight:800;
  }
  .sc-hr-pos{ color:#1a7a36; }
  .sc-hr-neg{ color:#c0392b; }
  .sc-hr-neu{ color:#555; }
  .sc-hr-zone.pos{ background:rgba(81,207,102,0.10); border-color:rgba(81,207,102,0.25); }
  .sc-hr-zone.neg{ background:rgba(192,57,43,0.08);  border-color:rgba(192,57,43,0.20); }

  .sc-dims{
    display:flex; gap:10px; font-size:0.7rem; opacity:0.55; flex-wrap:wrap;
  }
  .sc-loading{ text-align:center; padding:40px 20px; opacity:0.5; }

  @media(max-width:640px){
    .sc-grid{ grid-template-columns:1fr; }
    .sc-abbrev{ font-size:0.78rem; }
  }
</style>

<div class="card">
  <div class="card-header tp-header">
    <div>
      <div class="card-title">Today's Projections</div>
      <div class="card-subtitle">Stat probability distributions for every pitcher and hitter</div>
    </div>
    <form method="get" action="/todays-projections" class="tp-date-form">
      <button type="button" class="date-arrow" id="tp-prev">&lsaquo;</button>
      <input class="input" type="date" name="date" value="{{ date }}" aria-label="Pick date" />
      <button type="button" class="date-arrow" id="tp-next">&rsaquo;</button>
      <button class="btn" type="submit">Go</button>
    </form>
  </div>
</div>

<div id="tp-loading" class="tp-loading">Loading games and projections...</div>

<div id="tp-controls" class="tp-controls" style="display:none">
  <div class="tp-controls-row">
    <span class="tp-controls-label">View:</span>
    <div class="tp-view-tabs">
      <button class="tp-view-btn active" data-view="pitchers">Pitchers</button>
      <button class="tp-view-btn" data-view="batters">Batters</button>
      <button class="tp-view-btn" data-view="stadium">Stadium Conditions</button>
    </div>
    <span class="tp-controls-label" id="tp-mode-label">Mode:</span>
    <div class="tp-view-tabs" id="tp-mode-group">
      <button class="tp-view-btn tp-mode-btn active" data-mode="exact">Exact</button>
      <button class="tp-view-btn tp-mode-btn" data-mode="cumul">Over</button>
    </div>
  </div>
  <div class="tp-controls-row" id="tp-stat-row">
    <span class="tp-controls-label">Stat:</span>
    <div class="tp-stat-toggle" id="tp-stat-toggle"></div>
  </div>
</div>

<div id="tp-table-area"></div>
<div id="tp-stadium-area" style="display:none"></div>

<script>
(function(){
  const GAMES = {{ games | tojson }};

  // ---- Poisson math ----
  function poissonPMF(lam, k){
    if(lam <= 0) return k === 0 ? 1 : 0;
    let logP = -lam + k * Math.log(lam);
    for(let i = 2; i <= k; i++) logP -= Math.log(i);
    return Math.exp(logP);
  }

  function computeDist(lam, maxK){
    const dist = [];
    for(let k = 0; k <= maxK; k++){
      dist.push(poissonPMF(lam, k) * 100);
    }
    return dist;
  }

  // ---- Stat definitions ----
  const P_STATS = [
    {key:'k',  label:'Strikeouts',     maxK:10},
    {key:'ip', label:'Innings Pitched', maxK:8},
    {key:'h',  label:'Hits Allowed',    maxK:9},
    {key:'bb', label:'Walks',           maxK:5},
    {key:'hr', label:'Homers Allowed',  maxK:3},
  ];
  const B_STATS = [
    {key:'h',   label:'Hits',      maxK:4},
    {key:'hr',  label:'Home Runs', maxK:3},
    {key:'rbi', label:'RBIs',      maxK:5},
  ];

  // ---- Lambda computations ----
  function pitcherLambdas(side, isSpring){
    const batters = (side.batters||[]).filter(b => b.probs && Object.keys(b.probs).length);
    if(!batters.length) return null;
    const n = batters.length;
    const estBF = isSpring ? 12 : 24;
    const avgK   = batters.reduce((s,b)=>s+(b.probs.K||0),0)/n;
    const avgBB  = batters.reduce((s,b)=>s+(b.probs.BB||0)+(b.probs.IBB||0)+(b.probs.HBP||0),0)/n;
    const avgHit = batters.reduce((s,b)=>s+(b.summary?.hit_pct||0),0)/n;
    const avgHR  = batters.reduce((s,b)=>s+(b.probs.HR||0),0)/n;
    const avgOut = batters.reduce((s,b)=>s+(b.probs.OUT||0)+(b.probs.K||0),0)/n;
    return { k: estBF*avgK, ip: estBF*avgOut/3, h: estBF*avgHit, bb: estBF*avgBB, hr: estBF*avgHR };
  }

  function batterLambdas(b){
    const probs = b.probs||{};
    const summary = b.summary||{};
    const sl = b.statline||{};
    if(!sl.pa) return null;
    return {
      h:   sl.pa * (summary.hit_pct||0),
      hr:  sl.pa * (probs.HR||0),
      rbi: sl.rbi || sl.pa * ((probs.HR||0)*1.5 + (probs['2B']||0)*0.5 + (probs['3B']||0)*0.8 + (probs['1B']||0)*0.15),
    };
  }

  // ---- Formatting ----
  function fmtPct(pct){
    if(pct >= 10) return pct.toFixed(0) + '%';
    if(pct >= 1)  return pct.toFixed(1) + '%';
    if(pct >= 0.1) return pct.toFixed(1) + '%';
    return '&lt;1%';
  }
  function pctBg(pct){
    // Green-tinted background that scales with probability
    // High values get more opaque background, low values are subtle
    const alpha = Math.min(0.35, pct / 80);
    return `background:rgba(81,207,102,${alpha.toFixed(3)})`;
  }
  function headshotUrl(pid){
    return `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_80,q_auto:best/v1/people/${pid}/headshot/67/current`;
  }
  function teamLogoUrl(tid){
    return tid ? `https://www.mlbstatic.com/team-logos/${tid}.svg` : '';
  }

  // ---- Global data stores ----
  let allPitchers = [];
  let allBatters = [];
  let currentView = 'pitchers';
  let stadiumData = null; // loaded lazily
  let currentPStat = 'k';
  let currentBStat = 'h';
  let currentMode = 'exact'; // 'exact' or 'cumul'
  let sortCol = 'exp';
  let sortDir = -1; // -1 = desc

  // ---- Filter games ----
  const previewGames = GAMES.filter(g=>{
    const ds = (g.detailedState||'').toLowerCase();
    return ds.includes('scheduled') || ds.includes('warmup') || ds.includes('pre-game')
      || ds.includes('preview') || ds.includes('in progress') || ds.includes('live');
  });

  if(!previewGames.length && !GAMES.length){
    document.getElementById('tp-loading').style.display = 'none';
    document.getElementById('tp-table-area').innerHTML = '<div class="tp-empty">No upcoming games for this date.</div>';
  } else if(!previewGames.length){
    // Games exist (completed/postponed) but none eligible for projections
    document.getElementById('tp-loading').style.display = 'none';
    document.getElementById('tp-controls').style.display = 'flex';
    document.getElementById('tp-table-area').innerHTML = '<div class="tp-empty">No upcoming games for this date.</div>';
    attachViewListeners();
  } else {
    let loaded = 0;
    const total = previewGames.length;

    previewGames.forEach((g, gi)=>{
      fetch(`/game/${g.gamePk}/pregame.json`)
        .then(r=>r.json())
        .then(d => collectGameData(d, g))
        .catch(()=>{})
        .finally(()=>{
          loaded++;
          if(loaded === total) finishLoading();
        });
    });
  }

  function collectGameData(d, gameMeta){
    if(!d.ok || !d.lineups_posted) return;

    const awayLogo = gameMeta.away?.logo || '';
    const homeLogo = gameMeta.home?.logo || '';
    const awayAbbrev = d.away_abbrev || gameMeta.away?.abbrev || '';
    const homeAbbrev = d.home_abbrev || gameMeta.home?.abbrev || '';

    // Pitchers
    // d.home = away pitcher facing home lineup; d.away = home pitcher facing away lineup
    [
      {side: d.home, pitcher: d.home?.pitcher, teamAbbrev: awayAbbrev, teamLogo: awayLogo, oppAbbrev: homeAbbrev, oppLogo: homeLogo},
      {side: d.away, pitcher: d.away?.pitcher, teamAbbrev: homeAbbrev, teamLogo: homeLogo, oppAbbrev: awayAbbrev, oppLogo: awayLogo},
    ].forEach(cfg => {
      if(!cfg.pitcher) return;
      const lam = pitcherLambdas(cfg.side, d.is_spring);
      if(!lam) return;
      const hand = cfg.pitcher.throws === 'L' ? 'LHP' : 'RHP';
      allPitchers.push({
        id: cfg.pitcher.id,
        name: cfg.pitcher.name,
        hand,
        teamAbbrev: cfg.teamAbbrev,
        teamLogo: cfg.teamLogo,
        oppAbbrev: cfg.oppAbbrev,
        oppLogo: cfg.oppLogo,
        lambdas: lam,
      });
    });

    // Batters
    [
      {batters: d.away?.batters||[], teamAbbrev: awayAbbrev, teamLogo: awayLogo, oppName: d.away?.pitcher?.name || '', oppAbbrev: homeAbbrev, oppLogo: homeLogo},
      {batters: d.home?.batters||[], teamAbbrev: homeAbbrev, teamLogo: homeLogo, oppName: d.home?.pitcher?.name || '', oppAbbrev: awayAbbrev, oppLogo: awayLogo},
    ].forEach(cfg => {
      cfg.batters.forEach(b => {
        const lam = batterLambdas(b);
        if(!lam) return;
        allBatters.push({
          id: b.id,
          name: b.name,
          stand: b.stand,
          pos: b.pos,
          teamAbbrev: cfg.teamAbbrev,
          teamLogo: cfg.teamLogo,
          oppAbbrev: cfg.oppAbbrev,
          oppLogo: cfg.oppLogo,
          oppName: cfg.oppName,
          lambdas: lam,
        });
      });
    });
  }

  function finishLoading(){
    document.getElementById('tp-loading').style.display = 'none';
    document.getElementById('tp-controls').style.display = 'flex';

    if(!allPitchers.length && !allBatters.length){
      document.getElementById('tp-table-area').innerHTML = '<div class="tp-empty">No lineups posted yet. Check back closer to game time.</div>';
      // Still show controls so Stadium Conditions tab is accessible
      attachViewListeners();
      return;
    }

    buildStatToggle();
    renderTable();
    attachViewListeners();
  }

  function attachViewListeners(){
    // View toggle (Pitchers / Batters / Stadium Conditions)
    document.querySelectorAll('.tp-view-btn:not(.tp-mode-btn)').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        document.querySelectorAll('.tp-view-btn:not(.tp-mode-btn)').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;

        const isStadium = currentView === 'stadium';
        document.getElementById('tp-mode-label').style.display = isStadium ? 'none' : '';
        document.getElementById('tp-mode-group').style.display = isStadium ? 'none' : '';
        document.getElementById('tp-stat-row').style.display = isStadium ? 'none' : '';
        document.getElementById('tp-table-area').style.display = isStadium ? 'none' : '';
        document.getElementById('tp-stadium-area').style.display = isStadium ? '' : 'none';
        if(isStadium){
          loadStadiumConditions();
        } else {
          sortCol = 'exp'; sortDir = -1;
          buildStatToggle();
          renderTable();
        }
      });
    });

    // Mode toggle (Exact / Over)
    document.querySelectorAll('.tp-mode-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        document.querySelectorAll('.tp-mode-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        sortCol = 'exp'; sortDir = -1;
        renderTable();
      });
    });
  }

  function buildStatToggle(){
    const stats = currentView === 'pitchers' ? P_STATS : B_STATS;
    const current = currentView === 'pitchers' ? currentPStat : currentBStat;
    const el = document.getElementById('tp-stat-toggle');
    el.innerHTML = stats.map(s =>
      `<button class="tp-stat-btn ${s.key===current?'active':''}" data-stat="${s.key}">${s.label}</button>`
    ).join('');
    el.querySelectorAll('.tp-stat-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        el.querySelectorAll('.tp-stat-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        if(currentView === 'pitchers') currentPStat = btn.dataset.stat;
        else currentBStat = btn.dataset.stat;
        sortCol = 'exp'; sortDir = -1;
        renderTable();
      });
    });
  }

  function renderTable(){
    const isPitcher = currentView === 'pitchers';
    const stats = isPitcher ? P_STATS : B_STATS;
    const statKey = isPitcher ? currentPStat : currentBStat;
    const stat = stats.find(s=>s.key===statKey);
    const maxK = stat.maxK;
    const players = isPitcher ? allPitchers : allBatters;

    const isCumul = currentMode === 'cumul';

    // Compute distributions
    const rows = players.map(p => {
      const lam = p.lambdas[statKey] || 0;
      const exactDist = computeDist(lam, maxK);
      let dist;
      if(isCumul){
        // cumul[k] = P(X >= k) = 1 - sum(P(0)..P(k-1))
        dist = [];
        let cumSum = 0;
        for(let k = 0; k <= maxK; k++){
          dist.push((1 - cumSum) * 100);
          cumSum += exactDist[k] / 100;
        }
      } else {
        dist = exactDist;
      }
      return { ...p, dist, lam };
    });

    // Sort
    rows.sort((a,b)=>{
      let av, bv;
      if(sortCol === 'name'){ av = a.name.toLowerCase(); bv = b.name.toLowerCase(); return sortDir * av.localeCompare(bv); }
      if(sortCol === 'opp'){ av = a.oppAbbrev; bv = b.oppAbbrev; return sortDir * av.localeCompare(bv); }
      if(sortCol === 'exp'){ av = a.lam; bv = b.lam; }
      else { const k = parseInt(sortCol); av = a.dist[k]||0; bv = b.dist[k]||0; }
      return sortDir * (av - bv);
    });

    // Build table
    let html = '<div class="tp-tbl-wrap"><table class="tp-tbl"><thead><tr>';

    // Player column
    const sc = col => col===sortCol ? 'sorted' : '';
    const arrow = col => col===sortCol ? (sortDir>0?'&#9650;':'&#9660;') : '&#9650;';
    html += `<th class="player-col ${sc('name')}" data-sort="name">Player <span class="sort-arrow">${arrow('name')}</span></th>`;
    html += `<th class="opp-col ${sc('opp')}" data-sort="opp">${isPitcher ? 'Opponent' : 'vs Pitcher'} <span class="sort-arrow">${arrow('opp')}</span></th>`;

    for(let k = 0; k <= maxK; k++){
      const label = isCumul ? `${k}+` : (k === maxK ? `${k}+` : k);
      html += `<th class="num-col ${sc(String(k))}" data-sort="${k}">${label} <span class="sort-arrow">${arrow(String(k))}</span></th>`;
    }
    html += `<th class="exp-col ${sc('exp')}" data-sort="exp">Exp <span class="sort-arrow">${arrow('exp')}</span></th>`;
    html += '</tr></thead><tbody>';

    rows.forEach(r => {
      html += '<tr>';

      // Player cell
      html += `<td class="player-td"><div class="tp-player-cell">`;
      if(r.teamLogo) html += `<img class="tp-team-logo" src="${r.teamLogo}" alt="" onerror="this.style.display='none'">`;
      html += `<img class="tp-player-img" src="${headshotUrl(r.id)}" alt="" onerror="this.style.display='none'">`;
      html += `<div class="tp-player-info"><div class="tp-player-name">${r.name}</div>`;
      if(isPitcher){
        html += `<div class="tp-player-meta">${r.teamAbbrev} &middot; ${r.hand}</div>`;
      } else {
        html += `<div class="tp-player-meta">${r.teamAbbrev} &middot; ${r.stand} ${r.pos}</div>`;
      }
      html += '</div></div></td>';

      // Opponent cell
      html += `<td class="opp-td"><div class="tp-opp-cell">`;
      if(r.oppLogo) html += `<img class="tp-opp-logo" src="${r.oppLogo}" alt="" onerror="this.style.display='none'">`;
      if(isPitcher){
        html += `<span class="tp-opp-name">${r.oppAbbrev}</span>`;
      } else {
        html += `<span class="tp-opp-name">${r.oppName || r.oppAbbrev}</span>`;
      }
      html += '</div></td>';

      // Pct cells — always maxK+1 cells
      for(let k = 0; k <= maxK; k++){
        const pct = r.dist[k] || 0;
        html += `<td><span class="tp-pct" style="${pctBg(pct)}">${fmtPct(pct)}</span></td>`;
      }

      // Expected
      html += `<td class="exp-td">${r.lam.toFixed(1)}</td>`;
      html += '</tr>';
    });

    if(!rows.length){
      html += `<tr><td colspan="${maxK + 4}" style="text-align:center; opacity:0.4; padding:20px;">No data available</td></tr>`;
    }

    html += '</tbody></table></div>';

    document.getElementById('tp-table-area').innerHTML = html;

    // Sort click handlers
    document.querySelectorAll('.tp-tbl th[data-sort]').forEach(th=>{
      th.addEventListener('click', ()=>{
        const col = th.dataset.sort;
        if(sortCol === col) sortDir *= -1;
        else { sortCol = col; sortDir = (col==='name'||col==='opp') ? 1 : -1; }
        renderTable();
      });
    });
  }

  // ---- Stadium Conditions ----
  function windDegToCompass(deg){
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(deg / 22.5) % 16];
  }

  function fmtFactor(f){
    const pct = Math.round((f - 1.0) * 100);
    if(pct > 0) return `+${pct}%`;
    if(pct < 0) return `${pct}%`;
    return '0%';
  }

  function hrZoneClass(f){
    if(f > 1.03) return 'pos';
    if(f < 0.97) return 'neg';
    return '';
  }

  function hrValClass(f){
    if(f > 1.03) return 'sc-hr-pos';
    if(f < 0.97) return 'sc-hr-neg';
    return 'sc-hr-neu';
  }

  function envBadgeClass(label){
    if(label === 'Dome (controlled)') return 'sc-env-dome';
    if(label === 'Very hitter-friendly') return 'sc-env-hitter-very';
    if(label === 'Hitter-friendly') return 'sc-env-hitter';
    if(label === 'Very pitcher-friendly') return 'sc-env-pitcher-very';
    if(label === 'Pitcher-friendly') return 'sc-env-pitcher';
    return 'sc-env-neutral';
  }

  function renderStadiumCard(g){
    const w = g.weather || {};
    const imp = w.impact || {};
    const dome = w.dome;

    const awayLogo = (g.away||{}).logo || '';
    const homeLogo = (g.home||{}).logo || '';
    const awayAbbrev = (g.away||{}).abbrev || '';
    const homeAbbrev = (g.home||{}).abbrev || '';
    const venueName = g.venue || 'Unknown Venue';
    const venueLoc = g.venueLocation || '';
    const label = imp.label || 'Neutral';
    const envCls = envBadgeClass(label);

    const lf = imp.lf_hr_factor || 1;
    const cf = imp.cf_hr_factor || 1;
    const rf = imp.rf_hr_factor || 1;
    const xbh = imp.xbh_factor || 1;

    let weatherHtml = '';
    if(!dome && w.condition){
      const windDir = windDegToCompass(w.wind_dir || 0);
      const cfMph = (imp.components||{}).cf_wind_mph || 0;
      const cfLabel = cfMph >= 0 ? `out +${cfMph.toFixed(0)} mph` : `in ${cfMph.toFixed(0)} mph`;
      weatherHtml = `
        <div class="sc-weather-row">
          <div class="sc-weather-item">
            <span class="sc-weather-label">Cond</span>
            <span>${w.condition}</span>
          </div>
          <div class="sc-weather-item">
            <span class="sc-weather-label">Temp</span>
            <span>${w.temp_f}°F</span>
          </div>
          <div class="sc-weather-item">
            <span class="sc-weather-label">Wind</span>
            <span>${w.wind_mph} mph ${windDir} (CF: ${cfLabel})</span>
          </div>
        </div>`;
    } else if(dome){
      weatherHtml = `<div class="sc-weather-row"><div class="sc-weather-item"><span class="sc-weather-label">Roof</span><span>Retractable/Fixed Dome</span></div></div>`;
    }

    return `
      <div class="sc-card">
        <div class="sc-card-header">
          <div class="sc-matchup">
            ${awayLogo ? `<img class="sc-team-logo" src="${awayLogo}" alt="" onerror="this.style.display='none'">` : ''}
            <span class="sc-abbrev">${awayAbbrev}</span>
            <span class="sc-at">@</span>
            ${homeLogo ? `<img class="sc-team-logo" src="${homeLogo}" alt="" onerror="this.style.display='none'">` : ''}
            <span class="sc-abbrev">${homeAbbrev}</span>
          </div>
          <span class="sc-time">${g.timeLocal || ''}</span>
        </div>
        <div class="sc-venue-block">
          <div class="sc-venue-name">${venueName}</div>
          ${venueLoc ? `<div class="sc-venue-loc">${venueLoc}</div>` : ''}
        </div>
        <div class="sc-body">
          <span class="sc-env-badge ${envCls}">${label}</span>
          ${weatherHtml}
          <div class="sc-hr-grid">
            <div class="sc-hr-zone ${hrZoneClass(lf)}">
              <div class="sc-hr-zone-label">LF HR</div>
              <div class="sc-hr-val ${hrValClass(lf)}">${fmtFactor(lf)}</div>
            </div>
            <div class="sc-hr-zone ${hrZoneClass(cf)}">
              <div class="sc-hr-zone-label">CF HR</div>
              <div class="sc-hr-val ${hrValClass(cf)}">${fmtFactor(cf)}</div>
            </div>
            <div class="sc-hr-zone ${hrZoneClass(rf)}">
              <div class="sc-hr-zone-label">RF HR</div>
              <div class="sc-hr-val ${hrValClass(rf)}">${fmtFactor(rf)}</div>
            </div>
          </div>
          <div class="sc-dims">
            <span>XBH Adj: <b>${fmtFactor(xbh)}</b></span>
          </div>
        </div>
      </div>`;
  }

  function loadStadiumConditions(){
    const area = document.getElementById('tp-stadium-area');
    if(stadiumData){
      area.innerHTML = `<div class="sc-grid">${stadiumData.map(renderStadiumCard).join('')}</div>`;
      return;
    }
    area.innerHTML = '<div class="sc-loading">Fetching weather and park data…</div>';
    const dateVal = (document.querySelector('input[name="date"]') || {}).value || '';
    const qs = dateVal ? `?date=${dateVal}` : '';
    fetch(`/todays-projections/stadium-conditions.json${qs}`)
      .then(r => r.json())
      .then(data => {
        stadiumData = data;
        area.innerHTML = data.length
          ? `<div class="sc-grid">${data.map(renderStadiumCard).join('')}</div>`
          : '<div class="sc-loading">No games found for this date.</div>';
      })
      .catch(() => {
        area.innerHTML = '<div class="sc-loading">Failed to load stadium conditions.</div>';
      });
  }

  // Date navigation
  const prevBtn = document.getElementById('tp-prev');
  const nextBtn = document.getElementById('tp-next');
  const dateInput = document.querySelector('input[name="date"]');
  function adjDate(days){
    if(!dateInput||!dateInput.value) return;
    const dt = new Date(dateInput.value+'T00:00:00');
    dt.setDate(dt.getDate()+days);
    dateInput.value = dt.toISOString().slice(0,10);
    if(dateInput.form) dateInput.form.submit();
  }
  if(prevBtn) prevBtn.addEventListener('click', ()=>adjDate(-1));
  if(nextBtn) nextBtn.addEventListener('click', ()=>adjDate(1));
})();
</script>

{% endblock %}
