<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Basenerd</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      background: #0b0e13;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      padding-top: calc(20px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    }
    .offline-card {
      text-align: center;
      max-width: 320px;
    }
    .offline-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      opacity: .7;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .retry-btn {
      display: inline-block;
      padding: 12px 32px;
      border-radius: 12px;
      background: #f0b90b;
      color: #0b0e13;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .retry-btn:active {
      transform: scale(.97);
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-logo">&#9918;</div>
    <h1>You're Offline</h1>
    <p>Basenerd needs an internet connection to load live scores, stats, and player data. Check your connection and try again.</p>
    <button class="retry-btn" onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
