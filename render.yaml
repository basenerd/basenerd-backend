services:
  - type: web
    name: basenerd-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    plan: free

  - type: cron
    name: pitcher-reports
    runtime: docker
    schedule: "*/30 * * * *"  # Every 30 minutes
    dockerCommand: "python scripts/auto_pitcher_reports.py"
    plan: free

  - type: worker
    name: hr-monitor
    runtime: python
    buildCommand: "pip install -r requirements-worker.txt"
    startCommand: "python scripts/hr_monitor.py --daemon"
    plan: free
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
