services:
  - type: web
    name: basenerd-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --workers 1 --max-requests 200 --max-requests-jitter 20"
    plan: free

  - type: cron
    name: pitcher-reports
    runtime: python
    buildCommand: "pip install -r requirements-reports.txt"
    schedule: "*/15 * * * *"  # Every 15 minutes
    startCommand: "python scripts/daily_pitcher_emails.py"
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  - type: cron
    name: lineup-emails
    runtime: docker
    schedule: "*/15 * * * *"  # Every 15 minutes
    dockerCommand: "python scripts/auto_lineup_emails.py"
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

  - type: cron
    name: update-standings
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    schedule: "15 6 * * *"  # 6:15 AM UTC = 1:15 AM ET
    startCommand: "python scripts/update_standings.py"
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false

  - type: cron
    name: season-projection
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    schedule: "30 6 * * *"  # 6:30 AM UTC = 1:30 AM ET, after all games finish
    startCommand: "python scripts/update_season_projection.py"
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false

  - type: cron
    name: umpire-metrics
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    schedule: "0 7 * * *"  # 7:00 AM UTC = 2:00 AM ET
    startCommand: "python scripts/build_umpire_metrics_api.py"
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false

  - type: cron
    name: nrfi-tracker
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    schedule: "*/20 * * * *"  # Every 20 minutes
    startCommand: "python scripts/track_nrfi.py"
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false

  - type: worker
    name: hr-monitor
    runtime: docker
    dockerCommand: "python scripts/hr_monitor.py --daemon"
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
