services:
  - type: web
    name: basenerd-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    plan: free

  - type: cron
    name: pitcher-reports
    runtime: python
    buildCommand: "pip install -r requirements-reports.txt"
    schedule: "*/15 * * * *"  # Every 15 minutes
    startCommand: "python scripts/daily_pitcher_emails.py"
    plan: free

  - type: cron
    name: lineup-emails
    runtime: docker
    schedule: "*/15 * * * *"  # Every 15 minutes
    dockerCommand: "python scripts/auto_lineup_emails.py"
    plan: free

  - type: worker
    name: hr-monitor
    runtime: docker
    dockerCommand: "python scripts/hr_monitor.py --daemon"
    plan: free
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
